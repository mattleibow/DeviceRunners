parameters:
  - name: timeout
    type: number
    default: 300

steps:
  - bash: |
      UDID="$(SIMULATOR_UDID)"
      TIMEOUT=${{ parameters.timeout }}
      LOG_PATH="$(Agent.TempDirectory)/simulator.log"

      echo "Waiting for simulator $UDID to boot (timeout: ${TIMEOUT}s)..."

      # Portable timeout: macOS lacks GNU timeout
      xcrun simctl bootstatus "$UDID" -b &
      BOOT_PID=$!
      ( sleep "$TIMEOUT" && kill "$BOOT_PID" 2>/dev/null ) &
      WATCHDOG=$!

      if wait "$BOOT_PID" 2>/dev/null; then
        kill "$WATCHDOG" 2>/dev/null
        wait "$WATCHDOG" 2>/dev/null
        echo "Simulator booted ✓"
      else
        kill "$WATCHDOG" 2>/dev/null
        wait "$WATCHDOG" 2>/dev/null
        echo ""
        echo "========================================="
        echo "TIMEOUT: Simulator did not boot in ${TIMEOUT}s"
        echo "========================================="
        echo ""
        echo "=== Simulator Devices ==="
        xcrun simctl list devices
        echo ""
        echo "=== Runtimes ==="
        xcrun simctl list runtimes
        echo ""
        echo "=== Last 50 lines of simulator log ==="
        [ -f "$LOG_PATH" ] && tail -50 "$LOG_PATH"
        exit 1
      fi
    displayName: Wait for simulator boot

  - bash: |
      UDID="$(SIMULATOR_UDID)"
      LOG_PATH="$(Agent.TempDirectory)/simulator.log"

      echo "Waiting for SpringBoard and services to be ready..."

      TIMEOUT=60
      ELAPSED=0
      while [ $ELAPSED -lt $TIMEOUT ]; do
        if xcrun simctl spawn "$UDID" launchctl print system 2>/dev/null | grep -q "com.apple.SpringBoard"; then
          echo "SpringBoard is running ✓"
          break
        fi
        sleep 5
        ELAPSED=$((ELAPSED + 5))
        echo "  ... waiting for services (${ELAPSED}s / ${TIMEOUT}s)"
      done

      if [ $ELAPSED -ge $TIMEOUT ]; then
        echo "WARNING: SpringBoard readiness check timed out (services may still be starting)"
      fi

      echo ""
      echo "=== Recent simulator log ==="
      [ -f "$LOG_PATH" ] && tail -20 "$LOG_PATH"
      echo ""
      echo "Simulator $(SIMULATOR_UDID) is ready ✓"
    displayName: Verify SpringBoard ready
