parameters:
  - name: poolImage
    type: string
    default: 'macOS-15'
  - name: targetFramework
    type: string
    default: 'net10.0-ios'
  - name: runtimeIdentifier
    type: string
    default: 'iossimulator-x64'
  - name: simulatorDeviceType
    type: string
    default: 'iPhone 16'
  - name: configuration
    type: string
    default: 'release'

jobs:
  - job: dotnet_test_iOS
    displayName: 'dotnet test iOS'
    pool:
      vmImage: ${{ parameters.poolImage }}
    variables:
      TEST_TARGET_FRAMEWORK: ${{ parameters.targetFramework }}
      TEST_RUNTIME_IDENTIFIER: ${{ parameters.runtimeIdentifier }}
      TEST_CONFIGURATION: ${{ parameters.configuration }}
    steps:
      - checkout: self
      - template: validate-arch.yml
        parameters:
          runtimeIdentifier: ${{ parameters.runtimeIdentifier }}
      - template: setup-tools.yml
      - script: |
          SIMULATOR_NAME="DeviceRunner-$(Build.BuildId)-dotnet-test-ios"
          RESULT=$(dotnet apple simulator create "$SIMULATOR_NAME" --device-type "${{ parameters.simulatorDeviceType }}" --format json)
          UDID=$(echo "$RESULT" | jq -r '.udid')
          echo "##vso[task.setvariable variable=SIMULATOR_UDID]$UDID"
          echo "##vso[task.setvariable variable=SIMULATOR_NAME]$SIMULATOR_NAME"
          dotnet apple simulator boot "$UDID" --wait
        displayName: 'Create and Boot Simulator'
      - script: dotnet publish src/DeviceRunners.Cli/DeviceRunners.Cli.csproj -f net10.0 -r osx-x64 -p:PublishForTargetsPackage=true -o src/DeviceRunners.Testing.Targets/tools/osx-x64
        displayName: 'Publish CLI Tool Binaries'
      - script: |
          dotnet test sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj \
            -f $(TEST_TARGET_FRAMEWORK) \
            -r $(TEST_RUNTIME_IDENTIFIER) \
            -c $(TEST_CONFIGURATION) \
            -p:DeviceRunnersDevice=$(SIMULATOR_UDID) \
            --logger "trx;LogFileName=test-results.trx" \
            /bl:./artifacts/logs/msbuild-test.binlog
        displayName: 'Run Tests'
      - script: dotnet apple simulator delete --force "$(SIMULATOR_NAME)"
        displayName: 'Delete Simulator'
        condition: always()
      - script: |
          rm -rf ./artifacts/bin
          rm -rf ./artifacts/obj
        displayName: 'Clean up build artifacts before upload'
        condition: always()
      - publish: ./artifacts
        artifact: 'Test Results (dotnet test) - iOS'
        displayName: 'Upload Artifacts'
        condition: always()
