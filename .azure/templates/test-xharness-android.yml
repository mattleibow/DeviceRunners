parameters:
  - name: platforms
    type: object
    default:
      - name: Linux
        poolImage: 'ubuntu-24.04'
        emulatorImage: 'system-images;android-36;google_apis;x86_64'
        testRid: android-x64
        jdkArch: x64
        emulatorGpu: swiftshader_indirect
        emulatorCores: 2
        cpuThreshold: 3
        timeoutSeconds: 1800
      - name: macOS_x64
        poolImage: 'macOS-15'
        emulatorImage: 'system-images;android-36;google_apis;x86_64'
        testRid: android-x64
        jdkArch: x64
        emulatorGpu: guest
        emulatorCores: 2
        cpuThreshold: 25
        timeoutSeconds: 1800
  - name: targetFramework
    type: string
    default: net10.0-android
  - name: configuration
    type: string
    default: release
  - name: emulatorName
    type: string
    default: XHarnessEmulator

jobs:
  - ${{ each platform in parameters.platforms }}:
    - job: XHarness_Android_${{ replace(platform.name, ' ', '_') }}
      displayName: 'XHarness Android - ${{ platform.name }}'
      pool:
        vmImage: ${{ platform.poolImage }}
      variables:
        TEST_TARGET_FRAMEWORK: ${{ parameters.targetFramework }}
        TEST_RUNTIME_IDENTIFIER: ${{ platform.testRid }}
        TEST_CONFIGURATION: ${{ parameters.configuration }}
        TEST_EMULATOR_NAME: ${{ parameters.emulatorName }}
        ANDROID_TOOL_PROCESS_RUNNER_LOG_PATH: ./artifacts/logs/android-tool.log
        emulatorImage: ${{ platform.emulatorImage }}
        jdkArch: ${{ platform.jdkArch }}
        emulatorGpu: ${{ platform.emulatorGpu }}
        emulatorCores: ${{ platform.emulatorCores }}
        cpuThreshold: ${{ platform.cpuThreshold }}
        timeoutSeconds: ${{ platform.timeoutSeconds }}
      timeoutInMinutes: 60
      steps:
        - checkout: self
        - template: validate-arch.yml
          parameters:
            runtimeIdentifier: ${{ platform.testRid }}
        - template: setup-tools.yml
        - task: JavaToolInstaller@0
          displayName: 'Setup Java 21'
          inputs:
            versionSpec: '21'
            jdkArchitectureOption: $(jdkArch)
            jdkSourceOption: PreInstalled
        - script: |
            mkdir -p ./artifacts/logs
            dotnet android sdk install --package 'platform-tools' --package 'emulator' --package '$(emulatorImage)'
          displayName: 'Install Android SDK Packages'
        - script: |
            mkdir -p "$HOME/.android/avd"
            echo "##vso[task.setvariable variable=ANDROID_AVD_HOME]$HOME/.android/avd"
            echo "##vso[task.setvariable variable=ANDROID_EMULATOR_HOME]$HOME/.android"
          displayName: 'Set AVD environment variables'
        - script: dotnet android avd create --name $(TEST_EMULATOR_NAME) --sdk '$(emulatorImage)' --force
          displayName: 'Create Emulator'
        - script: |
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm
          displayName: 'Enable KVM'
          condition: eq(variables['Agent.OS'], 'Linux')
        - script: |
            dotnet android avd start -p 5554 --name $(TEST_EMULATOR_NAME) --no-window --gpu $(emulatorGpu) --no-snapshot --no-audio --no-boot-anim --wait --no-animations --cpu-threshold $(cpuThreshold) --cores $(emulatorCores) --timeout $(timeoutSeconds) --response-threshold 5
            dotnet android device list
          displayName: 'Start Emulator'
        - script: cat $(ANDROID_TOOL_PROCESS_RUNNER_LOG_PATH)
          displayName: 'Display Android Tool Logs'
          condition: always()
        - script: |
            dotnet publish sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj \
              -f $(TEST_TARGET_FRAMEWORK) \
              -r $(TEST_RUNTIME_IDENTIFIER) \
              -c $(TEST_CONFIGURATION) \
              -p:TestingMode=XHarness \
              -p:AndroidSdkDirectory=$ANDROID_SDK_ROOT \
              /bl:./artifacts/logs/msbuild-publish.binlog
          displayName: 'Publish App'
        - script: |
            ADB="${ANDROID_SDK_ROOT}/platform-tools/adb"
            $ADB -s emulator-5554 shell am force-stop com.android.phone || true
            sleep 30
            $ADB -s emulator-5554 shell getprop ro.build.version.sdk
          displayName: 'Wait for Emulator Stability'
          condition: eq(variables['Agent.OS'], 'Darwin')
        - script: |
            for i in $(seq 1 3)
            do
              echo "=== XHarness attempt $i ==="
              dotnet xharness android test \
                --timeout="00:10:00" \
                --launch-timeout=00:10:00 \
                --package-name com.companyname.devicetestingkitapp.devicetests \
                --instrumentation devicerunners.xharness.maui.XHarnessInstrumentation \
                --app artifacts/bin/DeviceTestingKitApp.DeviceTests/$(TEST_CONFIGURATION)_$(TEST_TARGET_FRAMEWORK)_$(TEST_RUNTIME_IDENTIFIER)/com.companyname.devicetestingkitapp.devicetests-Signed.apk \
                --output-directory artifacts/test-results \
                --verbosity=Debug \
              && code=0 && break || code=$?
              echo "=== Attempt $i failed with exit code $code ==="
              sleep 60
            done
            exit $code
          displayName: 'Run Tests'
        - script: dotnet android device logcat --output ./artifacts/logs/logcat.txt
          displayName: 'Capture Logcat'
          condition: always()
        - script: dotnet android avd delete --name $(TEST_EMULATOR_NAME) --force
          displayName: 'Cleanup Emulator'
          condition: always()
        - script: |
            rm -rf ./artifacts/bin
            rm -rf ./artifacts/obj
          displayName: 'Clean up build artifacts before upload'
          condition: always()
        - publish: ./artifacts
          artifact: 'Test Results (XHarness) - Android (${{ platform.name }}) Attempt$(System.JobAttempt)'
          displayName: 'Upload Artifacts'
          condition: always()
