parameters:
  - name: logsDirectory
    type: string
    default: artifacts/logs

steps:
  # ⚠️ IMPORTANT: This template MUST be called with condition: always()
  # Otherwise logs will be lost and emulator resources leaked on failure.
  - bash: |
      SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
      SERIAL="$(EMULATOR_SERIAL)"
      EMU_PID="$(EMULATOR_PID)"
      LOGS="${{ parameters.logsDirectory }}"

      echo "=== Teardown: Collecting logs for $SERIAL ==="
      mkdir -p "$LOGS"

      # 1. Emulator process log (always available even if emulator crashed)
      EMU_LOG="$(Agent.TempDirectory)/emulator.log"
      if [ -f "$EMU_LOG" ]; then
        cp "$EMU_LOG" "$LOGS/emulator.log"
        echo "Copied emulator.log"
      fi

      # Skip device log collection if serial is empty (setup failed)
      if [ -n "$SERIAL" ] && [ -n "$SDK" ]; then
        # 2. Full device logcat
        echo "Collecting logcat..."
        $SDK/platform-tools/adb -s "$SERIAL" logcat -d > "$LOGS/logcat.txt" 2>/dev/null || echo "WARNING: logcat collection failed"

        # 3. Bugreport (with portable timeout)
        echo "Collecting bugreport (max 120s)..."
        $SDK/platform-tools/adb -s "$SERIAL" bugreport "$LOGS/bugreport.zip" 2>/dev/null &
        BR_PID=$!
        ( sleep 120 && kill "$BR_PID" 2>/dev/null ) &
        WATCHDOG=$!
        wait "$BR_PID" 2>/dev/null && echo "Bugreport collected" || echo "WARNING: bugreport timed out or failed"
        kill "$WATCHDOG" 2>/dev/null || true
        wait "$WATCHDOG" 2>/dev/null || true

        # 4. ANR traces (best-effort)
        echo "Collecting ANR traces..."
        $SDK/platform-tools/adb -s "$SERIAL" pull /data/anr/ "$LOGS/anr/" 2>/dev/null || true

        # 5. Tombstones (best-effort)
        echo "Collecting tombstones..."
        $SDK/platform-tools/adb -s "$SERIAL" pull /data/tombstones/ "$LOGS/tombstones/" 2>/dev/null || true

        # 6. Shutdown emulator via ADB
        echo "Shutting down emulator..."
        $SDK/platform-tools/adb -s "$SERIAL" emu kill 2>/dev/null || true
      else
        echo "WARNING: No emulator serial or SDK path — skipping device log collection"
      fi

      # 7. Fallback: force-kill emulator process
      if [ -n "$EMU_PID" ]; then
        sleep 3
        if kill -0 "$EMU_PID" 2>/dev/null; then
          echo "Emulator still running, force killing PID $EMU_PID"
          kill -9 "$EMU_PID" 2>/dev/null || true
        fi
      fi

      echo ""
      echo "=== Logs collected in $LOGS ==="
      ls -la "$LOGS/" 2>/dev/null || true
    displayName: Collect logs and shutdown emulator
    condition: always()
