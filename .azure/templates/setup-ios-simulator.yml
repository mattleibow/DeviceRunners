parameters:
  - name: deviceType
    type: string
    default: iPhone 16
  - name: osVersion
    type: string
    default: latest

steps:
  - bash: |
      REQUESTED="${{ parameters.osVersion }}"
      if [ "$REQUESTED" = "latest" ]; then
        VERSION=$(xcrun simctl list runtimes -j 2>/dev/null | python3 -c "
      import json, sys
      data = json.load(sys.stdin)
      ios_runtimes = [r for r in data.get('runtimes', []) if r.get('platform') == 'iOS' and r.get('isAvailable')]
      if not ios_runtimes:
          print('NONE', file=sys.stderr)
          sys.exit(1)
      ios_runtimes.sort(key=lambda r: [int(x) for x in r['version'].split('.')], reverse=True)
      print(ios_runtimes[0]['version'])
      ")
        if [ -z "$VERSION" ] || [ "$VERSION" = "" ]; then
          echo "ERROR: No iOS runtimes available"
          xcrun simctl list runtimes
          exit 1
        fi
        echo "Resolved 'latest' to iOS $VERSION"
      else
        VERSION="$REQUESTED"
      fi
      echo "##vso[task.setvariable variable=RESOLVED_IOS_VERSION]$VERSION"
    displayName: Resolve iOS version

  - bash: |
      VERSION="$(RESOLVED_IOS_VERSION)"
      echo "Checking for iOS $VERSION runtime..."
      if ! xcrun simctl list runtimes | grep -q "iOS $VERSION"; then
        echo "ERROR: iOS runtime $VERSION not found"
        echo ""
        echo "Available runtimes:"
        xcrun simctl list runtimes
        exit 1
      fi
      echo "iOS $VERSION runtime available ✓"
    displayName: Pre-check runtime

  - bash: |
      SIM_NAME="DeviceRunner-$(Build.BuildId)-$(System.JobDisplayName)"
      echo "##vso[task.setvariable variable=SIMULATOR_NAME]$SIM_NAME"
      echo "Simulator name: $SIM_NAME"
    displayName: Generate unique sim name

  - bash: |
      VERSION="$(RESOLVED_IOS_VERSION)"
      SIM_NAME="$(SIMULATOR_NAME)"
      DEVICE_TYPE="${{ parameters.deviceType }}"

      echo "Creating simulator: $SIM_NAME ($DEVICE_TYPE, iOS $VERSION)"
      UDID=$(xcrun simctl create "$SIM_NAME" "$DEVICE_TYPE" "iOS $VERSION")
      echo "##vso[task.setvariable variable=SIMULATOR_UDID]$UDID"
      echo "Simulator UDID: $UDID"
    displayName: Create simulator

  - bash: |
      UDID="$(SIMULATOR_UDID)"
      echo "Booting simulator $UDID..."
      xcrun simctl boot "$UDID"
    displayName: Boot simulator

  - bash: |
      UDID="$(SIMULATOR_UDID)"
      LOG_PATH="$(Agent.TempDirectory)/simulator.log"
      echo "##vso[task.setvariable variable=SIMULATOR_LOG_PATH]$LOG_PATH"

      xcrun simctl spawn "$UDID" log stream --level info > "$LOG_PATH" 2>&1 &
      STREAM_PID=$!
      echo "$STREAM_PID" > "$(Agent.TempDirectory)/simulator-log-stream.pid"
      echo "##vso[task.setvariable variable=LOG_STREAM_PID]$STREAM_PID"
      echo "Log stream started with PID $STREAM_PID → $LOG_PATH"
    displayName: Start log stream
