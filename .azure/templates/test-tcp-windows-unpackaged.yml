parameters:
  - name: poolImage
    type: string
    default: 'windows-2025'
  - name: targetFramework
    type: string
    default: 'net10.0-windows10.0.19041.0'
  - name: runtimeIdentifier
    type: string
    default: 'win10-x64'
  - name: configuration
    type: string
    default: 'release'

jobs:
  - job: TCP_Windows_Unpackaged
    displayName: 'TCP Windows (EXE)'
    pool:
      vmImage: ${{ parameters.poolImage }}
    variables:
      TEST_TARGET_FRAMEWORK: ${{ parameters.targetFramework }}
      TEST_RUNTIME_IDENTIFIER: ${{ parameters.runtimeIdentifier }}
      TEST_CONFIGURATION: ${{ parameters.configuration }}
    steps:
      - checkout: self
      - template: setup-tools.yml
      - pwsh: dotnet pack src/DeviceRunners.Testing.Targets/DeviceRunners.Testing.Targets.csproj -c release
        displayName: 'Build DeviceRunners.Testing.Targets Package'
      - pwsh: |
          dotnet test sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj `
            -f $(TEST_TARGET_FRAMEWORK) `
            -c $(TEST_CONFIGURATION) `
            -p:WindowsPackageType=None `
            /bl:./artifacts/logs/msbuild-test.binlog
        displayName: 'Run Tests'
      - publish: ./artifacts
        artifact: 'Test Results (TCP) - Windows EXE'
        displayName: 'Upload Artifacts'
        condition: always()
