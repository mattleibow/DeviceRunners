parameters:
  - name: platforms
    type: object
    default:
      - name: x64
        poolImage: 'macOS-15'
        testRid: iossimulator-x64
  - name: targetFramework
    type: string
    default: net10.0-ios
  - name: configuration
    type: string
    default: debug
  - name: simulatorDeviceType
    type: string
    default: 'iPhone 16'

jobs:
  - ${{ each platform in parameters.platforms }}:
    - job: TCP_iOS_${{ replace(platform.name, ' ', '_') }}
      displayName: 'TCP iOS - ${{ platform.name }}'
      pool:
        vmImage: ${{ platform.poolImage }}
      variables:
        TEST_TARGET_FRAMEWORK: ${{ parameters.targetFramework }}
        TEST_RUNTIME_IDENTIFIER: ${{ platform.testRid }}
        TEST_CONFIGURATION: ${{ parameters.configuration }}
        TEST_SIMULATOR_DEVICE_TYPE: ${{ parameters.simulatorDeviceType }}
      timeoutInMinutes: 60
      steps:
        - checkout: self
        - template: validate-arch.yml
          parameters:
            runtimeIdentifier: ${{ platform.testRid }}
        - template: setup-tools.yml
        - script: |
            dotnet pack src/DeviceRunners.Cli/DeviceRunners.Cli.csproj -c release
            dotnet tool install --global --add-source artifacts/package/release DeviceRunners.Cli
          displayName: 'Build and Install CLI Tool'
        - script: |
            RESULT=$(dotnet apple simulator create "DeviceRunner-$(Build.BuildId)-tcp-ios" --device-type "$(TEST_SIMULATOR_DEVICE_TYPE)" --format json)
            echo "##vso[task.setvariable variable=SIMULATOR_UDID]$(echo "$RESULT" | jq -r '.udid')"
            dotnet apple simulator list
          displayName: 'Create Simulator'
        - script: |
            dotnet apple simulator boot "$(SIMULATOR_UDID)" --wait
            sleep 10
          displayName: 'Boot Simulator'
        - script: |
            dotnet build sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj \
              -f $(TEST_TARGET_FRAMEWORK) \
              -r $(TEST_RUNTIME_IDENTIFIER) \
              -c $(TEST_CONFIGURATION) \
              -p:TestingMode=NonInteractiveVisual \
              /bl:./artifacts/logs/msbuild-publish.binlog
          displayName: 'Publish App'
        - script: |
            app_bundle=$(find artifacts/bin/DeviceTestingKitApp.DeviceTests/$(TEST_CONFIGURATION)_$(TEST_TARGET_FRAMEWORK)_$(TEST_RUNTIME_IDENTIFIER) -name "*.app" -type d)
            device-runners ios test --app "$app_bundle" --device "$(SIMULATOR_UDID)" --results-directory artifacts/test-results
          displayName: 'Run Tests'
        - script: dotnet apple simulator delete --force "DeviceRunner-$(Build.BuildId)-tcp-ios"
          displayName: 'Cleanup Simulator'
          condition: always()
        - script: |
            rm -rf ./artifacts/bin
            rm -rf ./artifacts/obj
          displayName: 'Clean up build artifacts before upload'
          condition: always()
        - publish: ./artifacts
          artifact: 'Test Results (TCP) - iOS (${{ platform.name }})'
          displayName: 'Upload Artifacts'
          condition: always()
