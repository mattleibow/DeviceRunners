parameters:
  - name: poolImage
    type: string
    default: 'windows-2025'
  - name: targetFramework
    type: string
    default: 'net10.0-windows10.0.19041.0'
  - name: runtimeIdentifier
    type: string
    default: 'win10-x64'
  - name: configuration
    type: string
    default: 'release'

jobs:
  - job: XHarness_Windows
    displayName: 'XHarness Windows (MSIX)'
    pool:
      vmImage: ${{ parameters.poolImage }}
    variables:
      TEST_TARGET_FRAMEWORK: ${{ parameters.targetFramework }}
      TEST_RUNTIME_IDENTIFIER: ${{ parameters.runtimeIdentifier }}
      TEST_CONFIGURATION: ${{ parameters.configuration }}
    steps:
      - checkout: self
      - template: setup-tools.yml
      - pwsh: |
          $fingerprint = ./scripts/New-Certificate.ps1 -Project sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj
          dotnet publish sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj `
            -f $(TEST_TARGET_FRAMEWORK) `
            -c $(TEST_CONFIGURATION) `
            -p:TestingMode=XHarness `
            -p:IncludeFailingTests=false `
            -p:AppxPackageSigningEnabled=true `
            -p:PackageCertificateThumbprint=$fingerprint `
            -p:PackageCertificateKeyFile="" `
            /bl:./artifacts/logs/msbuild-publish.binlog
          ./scripts/Remove-Certificate.ps1 -CertificateFingerprint $fingerprint
        displayName: 'Publish App'
      - pwsh: |
          $projectDir = Split-Path -Parent "sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj"
          # WindowsAppSDK 1.8+ emits the packaged .msix under the project's AppPackages
          # folder rather than under artifacts, so search both locations. Exclude the
          # framework dependency packages so we select the app package itself.
          $searchRoots = @('artifacts', (Join-Path $projectDir 'AppPackages')) | Where-Object { Test-Path $_ }
          $msix = Get-ChildItem -Recurse -Filter "*.msix" -Path $searchRoots -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -notmatch '[\\/]Dependencies[\\/]' -and $_.Name -notlike 'Microsoft.WindowsAppRuntime*' } |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $msix) { Write-Error "No .msix file found"; exit 1 }
          ./scripts/Start-Tests.ps1 `
            -App $msix `
            -OutputDirectory artifacts/test-results `
            -TestingMode XHarness
        displayName: 'Run Tests'
      - pwsh: |
          Remove-Item -Recurse -Force ./artifacts/bin -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force ./artifacts/obj -ErrorAction SilentlyContinue
        displayName: 'Clean up build artifacts before upload'
        condition: always()
      - publish: ./artifacts
        artifact: 'Test Results (XHarness) - Windows'
        displayName: 'Upload Artifacts'
        condition: always()
