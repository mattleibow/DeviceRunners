parameters:
  - name: targetFramework
    type: string
    default: 'net9.0'

jobs:
  - job: Validate_Template_Windows
    displayName: 'Validate Template (Windows)'
    pool:
      vmImage: 'windows-2025'
    steps:
      - checkout: self
      - template: setup-tools.yml
      - download: current
        artifact: 'NuGet'
        displayName: 'Download NuGet Packages'
      - script: |
          dir $(Pipeline.Workspace)\NuGet\
          dotnet new install $(Pipeline.Workspace)\NuGet\DeviceRunners.Templates.*.nupkg
          mkdir artifacts\package\release
          copy $(Pipeline.Workspace)\NuGet\*.nupkg artifacts\package\release\
          dotnet tool install --global DeviceRunners.Cli --prerelease
        displayName: 'Install Template and CLI Tool'
      - pwsh: |
          mkdir -Force artifacts/template-test | Out-Null
          Push-Location artifacts/template-test
          # Isolate from the repo's Directory.Build.props
          @'
          <Project>
            <PropertyGroup>
              <ManagePackageVersionsCentrally>false</ManagePackageVersionsCentrally>
              <CheckEolWorkloads>false</CheckEolWorkloads>
              <CheckEolTargetFramework>false</CheckEolTargetFramework>
            </PropertyGroup>
          </Project>
          '@ | Set-Content Directory.Build.props
          '<Project />' | Set-Content Directory.Build.targets
          dotnet new devicerunners -n TemplateValidation --Framework ${{ parameters.targetFramework }}
          Pop-Location
        displayName: 'Create Project from Template'
      - pwsh: |
          dotnet publish ./artifacts/template-test/TemplateValidation/TemplateValidation.csproj `
            -f ${{ parameters.targetFramework }}-windows10.0.19041.0 `
            -c release `
            -p:WindowsPackageType=None `
            --output artifacts/publish `
            /bl:./artifacts/logs/msbuild-template-build.binlog
        displayName: 'Build App (Unpackaged)'
      - pwsh: |
          $exe = Get-ChildItem "artifacts/publish/TemplateValidation.exe"
          device-runners windows test --app $exe --results-directory artifacts/test-results
        displayName: 'Run Tests'
      - task: PublishTestResults@2
        displayName: 'Publish Test Results'
        condition: always()
        inputs:
          testResultsFormat: 'VSTest'
          testResultsFiles: './artifacts/test-results/*.trx'
      - pwsh: |
          Remove-Item -Recurse -Force ./artifacts/template-test -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force ./artifacts/publish -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force ./artifacts/package -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force ./artifacts/bin -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force ./artifacts/obj -ErrorAction SilentlyContinue
        displayName: 'Clean up'
        condition: always()
      - publish: ./artifacts
        artifact: 'Test Results (Template) - Windows'
        displayName: 'Upload Artifacts'
        condition: always()

  - job: Validate_Template_macOS
    displayName: 'Validate Template (macOS)'
    pool:
      vmImage: 'macOS-15'
    steps:
      - checkout: self
      - template: setup-tools.yml
      - download: current
        artifact: 'NuGet'
        displayName: 'Download NuGet Packages'
      - script: |
          dotnet new install $(Pipeline.Workspace)/NuGet/DeviceRunners.Templates.*.nupkg
          mkdir -p artifacts/package/release
          cp $(Pipeline.Workspace)/NuGet/*.nupkg artifacts/package/release/
          dotnet tool install --global DeviceRunners.Cli --prerelease
        displayName: 'Install Template and CLI Tool'
      - script: |
          mkdir -p ./artifacts/template-test
          cd ./artifacts/template-test
          # Isolate from the repo's Directory.Build.props
          cat > Directory.Build.props << 'EOF'
          <Project>
            <PropertyGroup>
              <ManagePackageVersionsCentrally>false</ManagePackageVersionsCentrally>
              <CheckEolWorkloads>false</CheckEolWorkloads>
              <CheckEolTargetFramework>false</CheckEolTargetFramework>
            </PropertyGroup>
          </Project>
          EOF
          echo '<Project />' > Directory.Build.targets
          dotnet new devicerunners -n TemplateValidation --Framework ${{ parameters.targetFramework }}
        displayName: 'Create Project from Template'
      - script: |
          dotnet build ./artifacts/template-test/TemplateValidation/TemplateValidation.csproj \
            -f ${{ parameters.targetFramework }}-maccatalyst \
            -c release \
            /bl:./artifacts/logs/msbuild-template-build.binlog
        displayName: 'Build App (Mac Catalyst)'
      - script: |
          app_bundle=$(find artifacts -name "*.app" -type d | head -1)
          [ -n "$app_bundle" ] || { echo "##vso[task.logissue type=error]No .app bundle found"; exit 1; }
          device-runners macos test --app "$app_bundle" --results-directory artifacts/test-results
        displayName: 'Run Tests'
      - task: PublishTestResults@2
        displayName: 'Publish Test Results'
        condition: always()
        inputs:
          testResultsFormat: 'VSTest'
          testResultsFiles: './artifacts/test-results/*.trx'
      - script: |
          rm -rf ./artifacts/template-test
          rm -rf ./artifacts/package
          rm -rf ./artifacts/bin
          rm -rf ./artifacts/obj
        displayName: 'Clean up'
        condition: always()
      - publish: ./artifacts
        artifact: 'Test Results (Template) - macOS'
        displayName: 'Upload Artifacts'
        condition: always()
