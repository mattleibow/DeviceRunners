parameters:
  - name: platforms
    type: object
    default:
      - name: x64
        poolImage: 'macOS-15'
        testRid: iossimulator-x64
  - name: targetFramework
    type: string
    default: net10.0-ios
  - name: configuration
    type: string
    default: debug

jobs:
  - ${{ each platform in parameters.platforms }}:
    - job: XHarness_iOS_${{ replace(platform.name, ' ', '_') }}
      displayName: 'XHarness iOS - ${{ platform.name }}'
      pool:
        vmImage: ${{ platform.poolImage }}
      variables:
        TEST_TARGET_FRAMEWORK: ${{ parameters.targetFramework }}
        TEST_RUNTIME_IDENTIFIER: ${{ platform.testRid }}
        TEST_CONFIGURATION: ${{ parameters.configuration }}
      timeoutInMinutes: 60
      steps:
        - checkout: self
        - template: validate-arch.yml
          parameters:
            runtimeIdentifier: ${{ platform.testRid }}
        - template: setup-tools.yml
        - script: |
            RESULT=$(dotnet apple simulator create "DeviceRunner-$(Build.BuildId)-xharness-ios" --device-type "iPhone 16" --format json)
            echo "Simulator create result: $RESULT"
            UDID=$(echo "$RESULT" | jq -r '.udid')
            if [ -z "$UDID" ] || [ "$UDID" = "null" ]; then
              echo "❌ Failed to parse UDID from simulator create output"
              dotnet apple simulator list
              exit 1
            fi
            echo "Booting simulator $UDID..."
            xcrun simctl boot "$UDID"
            echo "Waiting for simulator to finish booting..."
            xcrun simctl bootstatus "$UDID" -b
            echo "Simulator booted successfully"
            echo "##vso[task.setvariable variable=SIMULATOR_UDID]$UDID"
            echo "Simulator UDID: $UDID"
          displayName: 'Create and Boot Simulator'
        - script: |
            dotnet build sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj \
              -f $(TEST_TARGET_FRAMEWORK) \
              -r $(TEST_RUNTIME_IDENTIFIER) \
              -c $(TEST_CONFIGURATION) \
              -p:TestingMode=XHarness \
              /bl:./artifacts/logs/msbuild-publish.binlog
          displayName: 'Publish App'
        - script: |
            for i in $(seq 1 3)
            do
              dotnet xharness apple test \
                --target ios-simulator-64 \
                --device "$(SIMULATOR_UDID)" \
                --timeout="00:10:00" \
                --launch-timeout=00:10:00 \
                --app artifacts/bin/DeviceTestingKitApp.DeviceTests/$(TEST_CONFIGURATION)_$(TEST_TARGET_FRAMEWORK)_$(TEST_RUNTIME_IDENTIFIER)/DeviceTestingKitApp.DeviceTests.app \
                --output-directory artifacts/test-results \
              && code=0 && break || code=$? && sleep 60
            done
            exit $code
          displayName: 'Run Tests'
        - script: dotnet apple simulator delete --force "DeviceRunner-$(Build.BuildId)-xharness-ios"
          displayName: 'Cleanup Simulator'
          condition: always()
        - script: |
            rm -rf ./artifacts/bin
            rm -rf ./artifacts/obj
          displayName: 'Clean up build artifacts before upload'
          condition: always()
        - publish: ./artifacts
          artifact: 'Test Results (XHarness) - iOS (${{ platform.name }})'
          displayName: 'Upload Artifacts'
          condition: always()
