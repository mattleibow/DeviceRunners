parameters:
  - name: logsDirectory
    type: string
    default: artifacts/logs
  - name: deleteSimulator
    type: boolean
    default: true

steps:
  # ⚠️ IMPORTANT: This template MUST be called with condition: always()
  # Otherwise logs will be lost and simulator resources leaked on failure.
  - bash: |
      UDID="$(SIMULATOR_UDID)"
      STREAM_PID="$(LOG_STREAM_PID)"
      LOGS="${{ parameters.logsDirectory }}"
      DELETE="${{ parameters.deleteSimulator }}"

      echo "=== Teardown: Collecting logs for simulator $UDID ==="
      mkdir -p "$LOGS"

      # 1. Kill log stream background process
      if [ -n "$STREAM_PID" ]; then
        echo "Stopping log stream (PID $STREAM_PID)..."
        kill "$STREAM_PID" 2>/dev/null || true
        sleep 1
      fi

      # Skip device log collection if UDID is empty (setup failed)
      if [ -z "$UDID" ]; then
        echo "WARNING: No simulator UDID — skipping device log collection"
        echo ""
        echo "=== Logs collected in $LOGS ==="
        ls -la "$LOGS/" 2>/dev/null || true
        exit 0
      fi

      # 2. Copy live-streamed log
      SIM_LOG="$(Agent.TempDirectory)/simulator.log"
      if [ -f "$SIM_LOG" ]; then
        cp "$SIM_LOG" "$LOGS/simulator-stream.log"
        echo "Copied simulator-stream.log ($(wc -l < "$SIM_LOG") lines)"
      fi

      # 3. Collect unified log archive (MUST be before shutdown)
      echo "Collecting system log archive..."
      xcrun simctl spawn "$UDID" log collect --output "$LOGS/system.logarchive" 2>/dev/null &
      LOG_COLLECT_PID=$!
      ( sleep 60 && kill "$LOG_COLLECT_PID" 2>/dev/null ) &
      LC_WATCHDOG=$!
      wait "$LOG_COLLECT_PID" 2>/dev/null && echo "Log archive collected" || echo "WARNING: log collect timed out or failed"
      kill "$LC_WATCHDOG" 2>/dev/null || true
      wait "$LC_WATCHDOG" 2>/dev/null || true

      # 4. Convert to human-readable
      if [ -e "$LOGS/system.logarchive" ]; then
        echo "Converting log archive to text..."
        log show "$LOGS/system.logarchive" > "$LOGS/system.log" 2>/dev/null || echo "WARNING: log show failed"
      fi

      # 5. Copy CoreSimulator device log
      DEVICE_LOG="$HOME/Library/Logs/CoreSimulator/$UDID/system.log"
      if [ -f "$DEVICE_LOG" ]; then
        cp "$DEVICE_LOG" "$LOGS/device.log"
        echo "Copied device.log"
      fi

      # 6. Copy crash reports
      CRASH_DIR="$HOME/Library/Logs/DiagnosticReports"
      if [ -d "$CRASH_DIR" ]; then
        mkdir -p "$LOGS/crash_reports"
        cp -r "$CRASH_DIR"/* "$LOGS/crash_reports/" 2>/dev/null || true
        CRASH_COUNT=$(ls -1 "$LOGS/crash_reports/" 2>/dev/null | wc -l)
        echo "Copied $CRASH_COUNT crash report(s)"
      fi

      # 7. Simulator diagnostics
      echo "Collecting simctl diagnostics..."
      xcrun simctl diagnose --no-archive --output "$LOGS/simctl_diagnostics" 2>/dev/null || true

      # 8. Shutdown simulator
      echo "Shutting down simulator..."
      xcrun simctl shutdown "$UDID" 2>/dev/null || true

      # 9. Delete or erase
      if [ "$DELETE" = "True" ] || [ "$DELETE" = "true" ]; then
        echo "Deleting simulator..."
        xcrun simctl delete "$UDID" 2>/dev/null || true
      else
        echo "Erasing simulator state (keeping for debugging)..."
        xcrun simctl erase "$UDID" 2>/dev/null || true
      fi

      echo ""
      echo "=== Logs collected in $LOGS ==="
      ls -la "$LOGS/" 2>/dev/null || true
    displayName: Collect logs and shutdown simulator
    condition: always()
