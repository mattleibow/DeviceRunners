parameters:
  - name: xcodeVersion
    type: string
    default: '26.2'

steps:
  - script: |
      echo "##vso[task.setvariable variable=MD_APPLE_SDK_ROOT]/Applications/Xcode_${{ parameters.xcodeVersion }}.app"
      sudo xcode-select -s /Applications/Xcode_${{ parameters.xcodeVersion }}.app/Contents/Developer
    displayName: 'Setup Xcode ${{ parameters.xcodeVersion }}'
    condition: eq(variables['Agent.OS'], 'Darwin')

  - task: UseDotNet@2
    displayName: 'Setup .NET 10.0.x'
    inputs:
      packageType: sdk
      version: 10.0.x

  - script: dotnet --info
    displayName: 'Show .NET Info'

  - script: dotnet workload install maui-android --source https://api.nuget.org/v3/index.json
    displayName: 'Setup .NET MAUI (Android only)'
    condition: eq(variables['Agent.OS'], 'Linux')

  - script: dotnet workload install maui --source https://api.nuget.org/v3/index.json
    displayName: 'Setup .NET MAUI'
    condition: ne(variables['Agent.OS'], 'Linux')

  - script: dotnet tool restore
    displayName: 'Restore .NET Tools'

  - script: |
      dotnet pack external/AndroidSdk.Tools/AndroidSdk.Tool/AndroidSdk.Tool.csproj -c Release -o ./artifacts/tools -p:Version=0.0.0-dev
      dotnet tool install --global --add-source ./artifacts/tools androidsdk.tool
    displayName: 'Build and Install Android Tool from Submodule'
    condition: ne(variables['Agent.OS'], 'Darwin')

  - script: |
      dotnet pack external/AndroidSdk.Tools/AndroidSdk.Tool/AndroidSdk.Tool.csproj -c Release -o ./artifacts/tools -p:Version=0.0.0-dev
      dotnet tool install --global --add-source ./artifacts/tools androidsdk.tool
      dotnet pack external/AppleDev.Tools/AppleDev.Tool/AppleDev.Tool.csproj -c Release -o ./artifacts/tools -p:Version=0.0.0-dev
      dotnet tool install --global --add-source ./artifacts/tools appledev.tools
    displayName: 'Build and Install Android & Apple Tools from Submodules'
    condition: eq(variables['Agent.OS'], 'Darwin')
