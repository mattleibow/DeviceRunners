parameters:
  - name: xcodeVersion
    type: string
    default: '26.2'

steps:
  - script: |
      echo "##vso[task.setvariable variable=MD_APPLE_SDK_ROOT]/Applications/Xcode_${{ parameters.xcodeVersion }}.app"
      sudo xcode-select -s /Applications/Xcode_${{ parameters.xcodeVersion }}.app/Contents/Developer
    displayName: 'Setup Xcode ${{ parameters.xcodeVersion }}'
    condition: eq(variables['Agent.OS'], 'Darwin')

  - task: UseDotNet@2
    displayName: 'Setup .NET 10.0.x'
    inputs:
      packageType: sdk
      version: 10.0.x

  - script: dotnet --info
    displayName: 'Show .NET Info'

  - script: dotnet workload install maui-android --source https://api.nuget.org/v3/index.json
    displayName: 'Setup .NET MAUI (Android only)'
    condition: eq(variables['Agent.OS'], 'Linux')

  - script: dotnet workload install maui --source https://api.nuget.org/v3/index.json
    displayName: 'Setup .NET MAUI'
    condition: ne(variables['Agent.OS'], 'Linux')

  - script: dotnet tool restore
    displayName: 'Restore .NET Tools'

  - script: |
      cd external/AppleDev.Tools && git fetch --unshallow 2>/dev/null || echo "Already unshallowed" && cd ../..
      GITHUB_ENV=/dev/null dotnet pack external/AppleDev.Tools/AppleDev.Tool/AppleDev.Tool.csproj -c Release -o ./artifacts/tools
      APPLE_VER=$(ls ./artifacts/tools/AppleDev.Tools.*.nupkg | head -1 | sed 's|.*/AppleDev\.Tools\.\(.*\)\.nupkg|\1|')
      dotnet tool install --local --add-source ./artifacts/tools appledev.tools --version "$APPLE_VER"
    displayName: 'Build and Install Apple Tool from Submodule'
    condition: eq(variables['Agent.OS'], 'Darwin')
