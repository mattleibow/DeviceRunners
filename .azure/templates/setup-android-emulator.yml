parameters:
  - name: emulatorName
    type: string
  - name: emulatorImage
    type: string
  - name: deviceProfile
    type: string
    default: pixel
  - name: gpuMode
    type: string
    default: ''
  - name: ramSize
    type: string
    default: '2048'

steps:
  - bash: yes 2>/dev/null | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
    displayName: Accept SDK licenses

  - bash: |
      export ANDROID_AVD_HOME="$HOME/.android/avd"
      mkdir -p "$ANDROID_AVD_HOME"
      echo "##vso[task.setvariable variable=ANDROID_AVD_HOME]$ANDROID_AVD_HOME"
    displayName: Set ANDROID_AVD_HOME

  - bash: |
      $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
        "${{ parameters.emulatorImage }}" \
        "emulator" \
        "platform-tools"
    displayName: Install SDK components

  - bash: $ANDROID_HOME/platform-tools/adb start-server
    displayName: Start ADB server

  - bash: |
      echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd \
        -n "${{ parameters.emulatorName }}" \
        -k "${{ parameters.emulatorImage }}" \
        --device "${{ parameters.deviceProfile }}" \
        --force
    displayName: Create AVD

  - bash: |
      CONFIG_FILE="$ANDROID_AVD_HOME/${{ parameters.emulatorName }}.avd/config.ini"
      if [ -f "$CONFIG_FILE" ]; then
        sed -i.bak "s/^hw.ramSize=.*/hw.ramSize=${{ parameters.ramSize }}/" "$CONFIG_FILE" || \
          echo "hw.ramSize=${{ parameters.ramSize }}" >> "$CONFIG_FILE"
        sed -i.bak "s/^vm.heapSize=.*/vm.heapSize=576/" "$CONFIG_FILE" || \
          echo "vm.heapSize=576" >> "$CONFIG_FILE"
        rm -f "${CONFIG_FILE}.bak"
        echo "=== AVD config ==="
        cat "$CONFIG_FILE"
      fi
    displayName: Configure AVD

  - bash: |
      GPU_MODE="${{ parameters.gpuMode }}"
      if [ -z "$GPU_MODE" ]; then
        if [ "$(Agent.OS)" = "Linux" ] || [ "$AGENT_OS" = "Linux" ]; then
          if [ -e /dev/kvm ]; then
            sudo chmod 666 /dev/kvm
            echo "KVM enabled"
          else
            echo "WARNING: /dev/kvm not found"
          fi
          GPU_MODE="swiftshader_indirect"
        else
          GPU_MODE="guest"
        fi
      fi
      echo "##vso[task.setvariable variable=EMULATOR_GPU]$GPU_MODE"
    displayName: Configure GPU and KVM

  - bash: |
      PORT=5554
      while [ $PORT -lt 5600 ]; do
        if ! lsof -i :$PORT >/dev/null 2>&1 && ! lsof -i :$((PORT+1)) >/dev/null 2>&1; then
          echo "Found free port: $PORT"
          echo "##vso[task.setvariable variable=EMULATOR_PORT]$PORT"
          exit 0
        fi
        PORT=$((PORT + 2))
      done
      echo "ERROR: No free emulator port found"
      exit 1
    displayName: Find free emulator port

  - bash: |
      LOG_PATH="$(Agent.TempDirectory)/emulator.log"
      echo "##vso[task.setvariable variable=EMULATOR_LOG_PATH]$LOG_PATH"

      $ANDROID_HOME/emulator/emulator \
        -avd "${{ parameters.emulatorName }}" \
        -port $(EMULATOR_PORT) \
        -gpu "$(EMULATOR_GPU)" \
        -no-window \
        -no-audio \
        -no-boot-anim \
        -no-snapshot-load \
        -no-snapshot-save \
        > "$LOG_PATH" 2>&1 &

      EMU_PID=$!
      echo "$EMU_PID" > "$(Agent.TempDirectory)/emulator.pid"
      echo "##vso[task.setvariable variable=EMULATOR_PID]$EMU_PID"
      echo "Emulator started with PID $EMU_PID on port $(EMULATOR_PORT)"
    displayName: Launch emulator

  - bash: |
      EXPECTED_SERIAL="emulator-$(EMULATOR_PORT)"
      echo "Waiting for $EXPECTED_SERIAL in adb devices..."

      TIMEOUT=30
      ELAPSED=0
      while [ $ELAPSED -lt $TIMEOUT ]; do
        SERIAL=$($ANDROID_HOME/platform-tools/adb devices | grep "^${EXPECTED_SERIAL}" | awk '{print $1}')
        if [ -n "$SERIAL" ]; then
          echo "##vso[task.setvariable variable=EMULATOR_SERIAL]$SERIAL"
          echo "Emulator serial: $SERIAL"
          exit 0
        fi

        EMU_PID=$(EMULATOR_PID)
        if ! kill -0 "$EMU_PID" 2>/dev/null; then
          echo "ERROR: Emulator process died during startup"
          tail -30 "$(Agent.TempDirectory)/emulator.log"
          exit 1
        fi

        sleep 2
        ELAPSED=$((ELAPSED + 2))
      done

      echo "ERROR: Emulator serial not detected after ${TIMEOUT}s"
      $ANDROID_HOME/platform-tools/adb devices -l
      tail -30 "$(Agent.TempDirectory)/emulator.log"
      exit 1
    displayName: Detect emulator serial
