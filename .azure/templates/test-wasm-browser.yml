parameters:
  - name: testProject
    type: string
    default: 'sample/test/DeviceTestingKitApp.BrowserTests/DeviceTestingKitApp.BrowserTests.csproj'
  - name: configuration
    type: string
    default: 'release'
  - name: timeout
    type: number
    default: 300

jobs:
  - job: WASM_Browser
    displayName: 'WASM Browser'
    pool:
      vmImage: 'ubuntu-24.04'
    steps:
      - checkout: self
      - template: setup-tools.yml
      - script: |
          dotnet pack src/DeviceRunners.Cli/DeviceRunners.Cli.csproj -c release
          dotnet tool install --global DeviceRunners.Cli
        displayName: 'Build and Install CLI Tool'
      - script: |
          dotnet publish ${{ parameters.testProject }} \
            -c ${{ parameters.configuration }} \
            /bl:./artifacts/logs/msbuild-wasm-publish.binlog
        displayName: 'Publish WASM Test App'
      - script: |
          wwwroot=$(find artifacts/publish -type d -name "wwwroot" | head -1)
          [ -n "$wwwroot" ] || { echo "##vso[task.logissue type=error]No wwwroot found in artifacts/publish"; exit 1; }
          device-runners wasm test \
            --app "$wwwroot" \
            --timeout ${{ parameters.timeout }} \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory artifacts/test-results
        displayName: 'Run Tests'
      - script: |
          rm -rf ./artifacts/bin
          rm -rf ./artifacts/obj
        displayName: 'Clean up build artifacts before upload'
        condition: always()
      - task: PublishTestResults@2
        displayName: 'Publish Test Results'
        condition: always()
        inputs:
          testResultsFormat: 'VSTest'
          testResultsFiles: './artifacts/test-results/*.trx'
      - publish: ./artifacts
        artifact: 'Test Results - WASM Browser'
        displayName: 'Upload Artifacts'
        condition: always()
