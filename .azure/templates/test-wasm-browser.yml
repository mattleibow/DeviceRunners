parameters:
  - name: testProject
    type: string
    default: 'sample/test/DeviceTestingKitApp.BrowserTests/DeviceTestingKitApp.BrowserTests.csproj'
  - name: configuration
    type: string
    default: 'release'
  - name: browser
    type: string
    default: 'chromium'
  - name: timeout
    type: number
    default: 300

jobs:
  - job: WASM_Browser
    displayName: 'WASM Browser'
    pool:
      vmImage: 'ubuntu-24.04'
    steps:
      - checkout: self

      - template: setup-tools.yml

      - script: dotnet build src/DeviceRunners.Cli/DeviceRunners.Cli.csproj -c ${{ parameters.configuration }} -f net10.0
        displayName: 'Build CLI Tool'

      - script: |
          dotnet publish ${{ parameters.testProject }} \
            -c ${{ parameters.configuration }} \
            /bl:./artifacts/logs/msbuild-wasm-publish.binlog
        displayName: 'Publish WASM Test App'

      - pwsh: |
          $playwrightScript = "$HOME/.nuget/packages/microsoft.playwright/1.52.0/build/playwright.ps1"
          if (Test-Path $playwrightScript) {
            & $playwrightScript install --with-deps ${{ parameters.browser }}
          } else {
            $found = Get-ChildItem -Path "$HOME/.nuget/packages/microsoft.playwright" -Recurse -Filter "playwright.ps1" | Select-Object -Last 1
            if ($found) {
              & $found.FullName install --with-deps ${{ parameters.browser }}
            } else {
              throw "Could not find Playwright install script"
            }
          }
        displayName: 'Install Playwright Browsers'

      - script: |
          PUBLISH_DIR=$(find ./artifacts -type d -name "wwwroot" -path "*/publish/*" 2>/dev/null | head -1)
          if [ -z "$PUBLISH_DIR" ]; then
            PUBLISH_DIR=$(find ./artifacts -name "index.html" -path "*/publish/*" 2>/dev/null | head -1 | xargs dirname 2>/dev/null || true)
          fi
          if [ -z "$PUBLISH_DIR" ]; then
            PUBLISH_DIR=$(find ./artifacts -type d -name "AppBundle" -path "*/publish/*" 2>/dev/null | head -1)
          fi
          if [ -z "$PUBLISH_DIR" ]; then
            PUBLISH_DIR=$(find ./artifacts -name "*.wasm" -path "*/publish/*" 2>/dev/null | head -1 | xargs dirname 2>/dev/null || true)
          fi
          if [ -z "$PUBLISH_DIR" ]; then
            echo "ERROR: Could not find published WASM app directory"
            find ./artifacts -type d -name "publish" 2>/dev/null
            exit 1
          fi
          echo "##vso[task.setvariable variable=WasmAppPath]$PUBLISH_DIR"
          echo "Found WASM app at: $PUBLISH_DIR"
        displayName: 'Determine WASM App Path'

      - script: |
          mkdir -p ./artifacts/test-results
          dotnet run --project src/DeviceRunners.Cli/DeviceRunners.Cli.csproj -f net10.0 -- \
            wasm test \
            --app "$(WasmAppPath)" \
            --browser ${{ parameters.browser }} \
            --timeout ${{ parameters.timeout }} \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./artifacts/test-results
        displayName: 'Run WASM Browser Tests'

      - task: PublishTestResults@2
        displayName: 'Publish Test Results'
        condition: always()
        inputs:
          testResultsFormat: 'VSTest'
          testResultsFiles: './artifacts/test-results/*.trx'

      - publish: ./artifacts/logs
        artifact: 'Logs - WASM Browser'
        displayName: 'Upload Logs'
        condition: always()

      - publish: ./artifacts/test-results
        artifact: 'Test Results - WASM Browser'
        displayName: 'Upload Test Results'
        condition: always()
