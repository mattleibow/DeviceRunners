parameters:
  - name: poolImage
    type: string
    default: 'ubuntu-24.04'
  - name: targetFramework
    type: string
    default: 'net10.0-android'
  - name: configuration
    type: string
    default: 'release'
  - name: emulatorImage
    type: string
    default: 'system-images;android-36;google_apis;x86_64'
  - name: emulatorGpu
    type: string
    default: 'swiftshader_indirect'
  - name: cpuThreshold
    type: number
    default: 3
  - name: responseThreshold
    type: number
    default: 5

jobs:
  - job: dotnet_test_Android
    displayName: 'dotnet test Android'
    pool:
      vmImage: ${{ parameters.poolImage }}
    variables:
      TEST_TARGET_FRAMEWORK: ${{ parameters.targetFramework }}
      TEST_CONFIGURATION: ${{ parameters.configuration }}
      ANDROID_AVD_HOME: $(HOME)/.android/avd
      ANDROID_EMULATOR_HOME: $(HOME)/.android
      ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 1
    steps:
      - checkout: self
      - template: validate-arch.yml
        parameters:
          expected: x64
      - template: setup-tools.yml
      - task: JavaToolInstaller@0
        inputs:
          versionSpec: '21'
          jdkArchitectureOption: 'x64'
          jdkSourceOption: 'PreInstalled'
      - script: dotnet publish src/DeviceRunners.Cli/DeviceRunners.Cli.csproj -f net10.0 -r linux-x64 -p:PublishForTargetsPackage=true -o src/DeviceRunners.Testing.Targets/tools/linux-x64
        displayName: 'Publish CLI Tool Binaries'
      - script: dotnet android sdk install --package 'platform-tools' --package 'emulator' --package '${{ parameters.emulatorImage }}'
        displayName: 'Install Android SDK Packages'
      - script: mkdir -p "$(HOME)/.android/avd"
        displayName: 'Create AVD directory'
      - script: dotnet android avd create --name DotnetTestEmulator --sdk '${{ parameters.emulatorImage }}' --force
        displayName: 'Create Emulator'
      - script: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
        displayName: 'Enable KVM'
      - script: |
          dotnet android avd start -p 5554 --name DotnetTestEmulator --no-window --gpu ${{ parameters.emulatorGpu }} --no-snapshot --no-audio --no-boot-anim --wait --no-animations --cpu-threshold ${{ parameters.cpuThreshold }} --response-threshold ${{ parameters.responseThreshold }}
          dotnet android device list
        displayName: 'Start Emulator'
      - script: |
          dotnet test sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj \
            -f $(TEST_TARGET_FRAMEWORK) \
            -c $(TEST_CONFIGURATION) \
            -p:AndroidSdkDirectory=$(ANDROID_SDK_ROOT) \
            --logger "trx;LogFileName=test-results.trx" \
            /bl:./artifacts/logs/msbuild-test.binlog
        displayName: 'Run Tests'
      - script: dotnet android device logcat --output ./artifacts/test-results/logcat.txt 2>/dev/null || true
        displayName: 'Capture Logcat'
        condition: always()
      - script: dotnet android avd delete --name DotnetTestEmulator --force 2>/dev/null || true
        displayName: 'Delete Emulator'
        condition: always()
      - script: |
          rm -rf ./artifacts/bin
          rm -rf ./artifacts/obj
        displayName: 'Clean up build artifacts before upload'
        condition: always()
      - publish: ./artifacts
        artifact: 'Test Results (dotnet test) - Android'
        displayName: 'Upload Artifacts'
        condition: always()
