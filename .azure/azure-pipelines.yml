# Full matrix documentation: docs/ci-pipeline.md
# This CI runs x64-only with Android API 36 for speed.
# To expand (arm64, more API levels), add matrix entries — all config is parameterized.
# Each template in templates/ accepts parameters with sensible defaults.
# Override parameters here to customize without editing templates.

trigger:
  branches:
    include:
      - main
      - releases/*
  paths:
    exclude:
      - .github/**

pr:
  branches:
    include:
      - main
      - releases/*
  paths:
    exclude:
      - .github/**

variables:
  NUPKG_MAJOR: '0.999'

stages:

  - stage: Build
    jobs:
      - job: Build
        strategy:
          matrix:
            Windows_Debug:
              poolImage: 'windows-2025'
              configuration: debug
            Windows_Release:
              poolImage: 'windows-2025'
              configuration: release
            macOS_Debug:
              poolImage: 'macOS-15'
              configuration: debug
        pool:
          vmImage: $(poolImage)
        steps:
          - checkout: self
          - template: templates/setup-tools.yml
          - script: dotnet build DeviceRunners.slnx --configuration $(configuration) /bl:./artifacts/logs/msbuild-build.binlog
            displayName: 'Build'
          - publish: ./artifacts/logs
            artifact: 'Logs - Build $(poolImage) ($(configuration))'
            displayName: 'Upload Logs'
            condition: always()

  - stage: Test
    dependsOn: []
    jobs:
      - job: Test
        strategy:
          matrix:
            Windows:
              poolImage: 'windows-2025'
            macOS:
              poolImage: 'macOS-15'
        pool:
          vmImage: $(poolImage)
        steps:
          - checkout: self
          - template: templates/setup-tools.yml
          - script: dotnet test test/Tests.slnx --configuration release --logger "trx;LogFileName=test-results.trx" --results-directory ./artifacts/test-results /bl:./artifacts/logs/msbuild-test.binlog
            displayName: 'Test'
          - task: PublishTestResults@2
            displayName: 'Publish Test Results'
            condition: always()
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: './artifacts/test-results/*.trx'
          - publish: ./artifacts/logs
            artifact: 'Logs - Test $(poolImage)'
            displayName: 'Upload Logs'
            condition: always()

  - stage: Pack
    dependsOn: []
    jobs:
      - job: Pack
        pool:
          vmImage: 'windows-2025'
        steps:
          - checkout: self
          - template: templates/setup-tools.yml
          - pwsh: |
              $VERSION = "$(NUPKG_MAJOR)-ci.$(Build.BuildId)"
              Write-Host "PACKAGE VERSION: $VERSION"
              dotnet pack --output ./artifacts/nugets --configuration release -p:PackageVersion=$VERSION /bl:./artifacts/logs/msbuild-pack.binlog /nodeReuse:false
            displayName: 'Pack NuGets'
          - publish: ./artifacts/nugets
            artifact: 'NuGet'
            displayName: 'Upload NuGet Artifacts'
          - publish: ./artifacts/logs
            artifact: 'Pack Logs'
            displayName: 'Upload Logs'
            condition: always()

  - stage: TCP_Device_Tests
    displayName: 'TCP Device Tests'
    dependsOn: []
    jobs:
      - template: templates/test-tcp-android.yml
      - template: templates/test-tcp-ios.yml
      - template: templates/test-tcp-macos.yml
      - template: templates/test-tcp-windows.yml
      - template: templates/test-tcp-windows-loose.yml
      - template: templates/test-tcp-windows-unpackaged.yml

  - stage: XHarness_Device_Tests
    displayName: 'XHarness Device Tests'
    dependsOn: []
    jobs:
      - template: templates/test-xharness-android.yml
      - template: templates/test-xharness-ios.yml
      - template: templates/test-xharness-maccatalyst.yml
      - template: templates/test-xharness-windows.yml

  - stage: WASM_Browser_Tests
    displayName: 'WASM Browser Tests'
    dependsOn: []
    jobs:
      - template: templates/test-wasm-browser.yml
