# Full matrix documentation: docs/ci-pipeline.md
# This CI runs x64-only with Android API 36 for speed.
# To expand (arm64, more API levels), add matrix entries — all config is parameterized.
# Each template in templates/ accepts parameters with sensible defaults.
# Override parameters here to customize without editing templates.

trigger:
  branches:
    include:
      - main
      - releases/*
  paths:
    exclude:
      - .github/**

pr:
  branches:
    include:
      - main
      - releases/*
  paths:
    exclude:
      - .github/**

stages:

  - stage: Build
    jobs:
      - template: templates/build.yml

  - stage: Test
    dependsOn: []
    jobs:
      - template: templates/test.yml

  - stage: Pack
    dependsOn: []
    jobs:
      - template: templates/pack.yml

  - stage: TCP_Device_Tests
    displayName: 'TCP Device Tests'
    dependsOn: []
    jobs:
      - template: templates/test-tcp-android.yml
      - template: templates/test-tcp-ios.yml
      - template: templates/test-tcp-macos.yml
      - template: templates/test-tcp-windows.yml
      - template: templates/test-tcp-windows-unpackaged.yml

  - stage: XHarness_Device_Tests
    displayName: 'XHarness Device Tests'
    dependsOn: []
    jobs:
      - template: templates/test-xharness-android.yml
      - template: templates/test-xharness-ios.yml
      - template: templates/test-xharness-maccatalyst.yml
      - template: templates/test-xharness-windows.yml
