name: 'XHarness Mac Catalyst Test'
description: 'Run XHarness-based device tests on macOS (Mac Catalyst)'

inputs:
  test-project:
    description: 'Path to the test project'
    default: 'sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj'
  target-framework:
    description: 'Target framework'
    default: 'net10.0-maccatalyst'
  runtime-identifier:
    description: 'Runtime identifier'
    default: 'maccatalyst-x64'
  configuration:
    description: 'Build configuration'
    default: 'debug'
  artifact-name:
    description: 'Artifact name'
    default: 'Test Results (XHarness) - Mac Catalyst (x64)'

runs:
  using: 'composite'
  steps:
    - name: Validate Architecture
      uses: ./.github/workflows/validate-arch
      with:
        runtime-identifier: ${{ inputs.runtime-identifier }}
    - name: Setup Required Tools
      uses: ./.github/workflows/setup-tools
    - name: Publish App
      shell: bash
      run: |
        dotnet build ${{ inputs.test-project }} \
          -f ${{ inputs.target-framework }} \
          -r ${{ inputs.runtime-identifier }} \
          -c ${{ inputs.configuration }} \
          -p:TestingMode=XHarness \
          /bl:./artifacts/logs/msbuild-publish.binlog
    - name: Discover App Bundle
      id: app
      shell: bash
      run: |
        OUTPUT_DIR="artifacts/bin/DeviceTestingKitApp.DeviceTests/${{ inputs.configuration }}_${{ inputs.target-framework }}_${{ inputs.runtime-identifier }}"
        APP_PATH=$(find "$OUTPUT_DIR" -maxdepth 1 -name "*.app" -type d | head -1)
        if [ -z "$APP_PATH" ]; then
          echo "::error::No .app bundle found in $OUTPUT_DIR"
          exit 1
        fi
        echo "path=$APP_PATH" >> "$GITHUB_OUTPUT"
    - name: Run Tests
      shell: bash
      run: |
        dotnet xharness apple test \
          --target maccatalyst \
          --timeout="00:02:00" \
          --launch-timeout=00:06:00 \
          --app "${{ steps.app.outputs.path }}" \
          --output-directory artifacts/test-results
    - name: Clean up build artifacts before upload
      if: always()
      shell: bash
      run: |
        rm -rf ./artifacts/bin
        rm -rf ./artifacts/obj
    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ./artifacts
