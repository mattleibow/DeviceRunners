name: Wait for Android Emulator
description: Wait for Android emulator boot to complete, verify services are ready

inputs:
  emulator-serial:
    description: 'Device serial from setup-android-emulator output'
    required: true
  emulator-pid:
    description: 'Emulator process PID from setup-android-emulator output'
    required: true
  timeout:
    description: 'Max seconds to wait for boot'
    required: false
    default: '600'

runs:
  using: composite
  steps:
    - name: Wait for boot
      shell: bash
      run: |
        SERIAL="${{ inputs.emulator-serial }}"
        EMU_PID="${{ inputs.emulator-pid }}"
        TIMEOUT=${{ inputs.timeout }}
        LOG_PATH="${{ runner.temp }}/emulator.log"

        echo "Waiting for emulator $SERIAL (PID $EMU_PID) to boot (timeout: ${TIMEOUT}s)..."

        # Stream emulator log in background for visibility
        if [ -f "$LOG_PATH" ]; then
          tail -f "$LOG_PATH" &
          TAIL_PID=$!
        fi

        ELAPSED=0
        BOOT_COMPLETE=false
        while [ $ELAPSED -lt $TIMEOUT ]; do
          # Check emulator process is alive
          if ! kill -0 "$EMU_PID" 2>/dev/null; then
            echo "ERROR: Emulator process (PID $EMU_PID) died"
            [ -f "$LOG_PATH" ] && tail -50 "$LOG_PATH"
            [ -n "${TAIL_PID:-}" ] && kill "$TAIL_PID" 2>/dev/null || true
            exit 1
          fi

          # Check boot_completed
          COMPLETED=$($ANDROID_HOME/platform-tools/adb -s "$SERIAL" shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || true)
          if [ "$COMPLETED" = "1" ]; then
            # Also check boot animation stopped
            BOOTANIM=$($ANDROID_HOME/platform-tools/adb -s "$SERIAL" shell getprop init.svc.bootanim 2>/dev/null | tr -d '\r' || true)
            if [ "$BOOTANIM" = "stopped" ] || [ "$COMPLETED" = "1" ]; then
              BOOT_COMPLETE=true
              break
            fi
          fi

          sleep 5
          ELAPSED=$((ELAPSED + 5))
          echo "  ... waiting (${ELAPSED}s / ${TIMEOUT}s)"
        done

        # Stop log streaming
        [ -n "${TAIL_PID:-}" ] && kill "$TAIL_PID" 2>/dev/null || true

        if [ "$BOOT_COMPLETE" != "true" ]; then
          echo ""
          echo "========================================="
          echo "TIMEOUT: Emulator did not boot in ${TIMEOUT}s"
          echo "========================================="
          echo ""
          echo "=== Device Properties ==="
          $ANDROID_HOME/platform-tools/adb -s "$SERIAL" shell getprop 2>/dev/null || echo "(adb shell failed)"
          echo ""
          echo "=== ADB Devices ==="
          $ANDROID_HOME/platform-tools/adb devices -l
          echo ""
          echo "=== Last 50 lines of emulator log ==="
          [ -f "$LOG_PATH" ] && tail -50 "$LOG_PATH"
          exit 1
        fi

        echo "Emulator booted successfully in ${ELAPSED}s"

    - name: Post-boot setup
      shell: bash
      run: |
        SERIAL="${{ inputs.emulator-serial }}"

        # Increase logcat buffer to prevent rotation during long test runs
        $ANDROID_HOME/platform-tools/adb -s "$SERIAL" logcat -G 16M 2>/dev/null || true

        # Dismiss lock screen
        $ANDROID_HOME/platform-tools/adb -s "$SERIAL" shell input keyevent 82 2>/dev/null || true

        # Disable animations for faster tests
        $ANDROID_HOME/platform-tools/adb -s "$SERIAL" shell settings put global window_animation_scale 0 2>/dev/null || true
        $ANDROID_HOME/platform-tools/adb -s "$SERIAL" shell settings put global transition_animation_scale 0 2>/dev/null || true
        $ANDROID_HOME/platform-tools/adb -s "$SERIAL" shell settings put global animator_duration_scale 0 2>/dev/null || true

    - name: Verify services
      shell: bash
      run: |
        SERIAL="${{ inputs.emulator-serial }}"

        echo "=== Verifying package manager ==="
        $ANDROID_HOME/platform-tools/adb -s "$SERIAL" shell pm list packages > /dev/null
        echo "Package manager responsive ✓"

        echo "=== Verifying system_server ==="
        SYSTEM_SERVER_PID=$($ANDROID_HOME/platform-tools/adb -s "$SERIAL" shell pidof system_server 2>/dev/null | tr -d '\r')
        if [ -z "$SYSTEM_SERVER_PID" ]; then
          echo "WARNING: system_server PID not found"
        else
          echo "system_server running (PID: $SYSTEM_SERVER_PID) ✓"
        fi

        echo ""
        echo "=== Connected Devices ==="
        $ANDROID_HOME/platform-tools/adb devices -l
        echo ""
        echo "Emulator $SERIAL is ready ✓"
