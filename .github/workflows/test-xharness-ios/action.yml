name: 'XHarness iOS Test'
description: 'Run XHarness-based device tests on iOS simulator'

inputs:
  test-project:
    description: 'Path to the test project'
    default: 'sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj'
  target-framework:
    description: 'Target framework'
    default: 'net10.0-ios'
  runtime-identifier:
    description: 'Runtime identifier'
    default: 'iossimulator-x64'
  configuration:
    description: 'Build configuration'
    default: 'release'
  simulator-device-type:
    description: 'Simulator device type'
    default: 'iPhone 16'
  artifact-name:
    description: 'Artifact name'
    default: 'Test Results (XHarness) - iOS (x64)'

runs:
  using: 'composite'
  steps:
    - name: Validate Architecture
      uses: ./.github/workflows/validate-arch
      with:
        runtime-identifier: ${{ inputs.runtime-identifier }}
    - name: Setup Required Tools
      uses: ./.github/workflows/setup-tools
    - name: Create Simulator
      id: simulator
      shell: bash
      run: |
        RESULT=$(dotnet apple simulator create "DeviceRunner-${{ github.run_id }}-xharness-ios" --device-type "${{ inputs.simulator-device-type }}" --format json)
        echo "udid=$(echo "$RESULT" | jq -r '.udid')" >> "$GITHUB_OUTPUT"
        dotnet apple simulator list
    - name: Boot Simulator
      shell: bash
      run: |
        dotnet apple simulator boot "${{ steps.simulator.outputs.udid }}" --wait
        sleep 30
    - name: Publish App
      shell: bash
      run: |
        dotnet build ${{ inputs.test-project }} \
          -f ${{ inputs.target-framework }} \
          -r ${{ inputs.runtime-identifier }} \
          -c ${{ inputs.configuration }} \
          -p:TestingMode=XHarness \
          /bl:./artifacts/logs/msbuild-publish.binlog
    - name: Run Tests
      shell: bash
      run: |
        for i in $(seq 1 3)
        do
          dotnet xharness apple test \
            --target ios-simulator-64 \
            --device "${{ steps.simulator.outputs.udid }}" \
            --timeout="00:10:00" \
            --launch-timeout=00:10:00 \
            --app artifacts/bin/DeviceTestingKitApp.DeviceTests/${{ inputs.configuration }}_${{ inputs.target-framework }}_${{ inputs.runtime-identifier }}/DeviceTestingKitApp.DeviceTests.app \
            --output-directory artifacts/test-results \
          && code=0 && break || code=$? && echo "Attempt $i failed (exit $code), rebooting simulator..." && dotnet apple simulator shutdown "${{ steps.simulator.outputs.udid }}" && sleep 5 && dotnet apple simulator boot "${{ steps.simulator.outputs.udid }}" --wait && sleep 30
        done
        exit $code
    - name: Cleanup Simulator
      if: always()
      shell: bash
      run: dotnet apple simulator delete --force "DeviceRunner-${{ github.run_id }}-xharness-ios"
    - name: Clean up build artifacts before upload
      if: always()
      shell: bash
      run: |
        rm -rf ./artifacts/bin
        rm -rf ./artifacts/obj
    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ./artifacts
