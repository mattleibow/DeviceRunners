name: 'dotnet test Windows (MSIX)'
description: 'Run device tests on Windows via dotnet test (loose-file MSIX registration)'

inputs:
  test-project:
    description: 'Path to the test project'
    default: 'sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj'
  target-framework:
    description: 'Target framework'
    default: 'net10.0-windows10.0.19041.0'
  configuration:
    description: 'Build configuration'
    default: 'release'
  artifact-name:
    description: 'Artifact name'
    default: 'Test Results (dotnet test) - Windows (MSIX)'

runs:
  using: 'composite'
  steps:
    - name: Setup Required Tools
      uses: ./.github/workflows/setup-tools
    - name: Enable Windows Developer Mode
      shell: pwsh
      run: |
        reg add "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /v AllowDevelopmentWithoutDevLicense /t REG_DWORD /d 1 /f
        reg add "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /v AllowAllTrustedApps /t REG_DWORD /d 1 /f
    - name: Publish CLI Tool Binaries
      shell: pwsh
      run: dotnet publish src/DeviceRunners.Cli/DeviceRunners.Cli.csproj -f net10.0 -r win-x64 -p:PublishForTargetsPackage=true -o src/DeviceRunners.Testing.Targets/tools/win-x64
    - name: Restore test project (populates NuGet cache for WinAppSDK)
      shell: pwsh
      run: dotnet restore ${{ inputs.test-project }}
    - name: Install Windows App Runtime framework
      shell: pwsh
      run: |
        $arch = if ($env:PROCESSOR_ARCHITECTURE -eq 'ARM64') { 'win10-arm64' } else { 'win10-x64' }
        $packagesRoot = Join-Path $env:USERPROFILE ".nuget/packages"
        # WindowsAppSDK 1.8+ moved the runtime MSIX packages out of the
        # microsoft.windowsappsdk metapackage into microsoft.windowsappsdk.runtime.
        $msixFiles = @()
        foreach ($pkg in @('microsoft.windowsappsdk.runtime', 'microsoft.windowsappsdk')) {
          $pkgRoot = Join-Path $packagesRoot $pkg
          if (-not (Test-Path $pkgRoot)) { continue }
          $versionDirs = Get-ChildItem $pkgRoot -Directory | Sort-Object Name -Descending
          foreach ($versionDir in $versionDirs) {
            $msixDir = Join-Path $versionDir.FullName "tools/MSIX/$arch"
            $found = Get-ChildItem "$msixDir/*.msix" -ErrorAction SilentlyContinue
            if ($found) {
              Write-Host "Installing WinAppSDK runtime from: $msixDir"
              $msixFiles = $found
              break
            }
          }
          if ($msixFiles.Count -gt 0) { break }
        }
        if ($msixFiles.Count -eq 0) { Write-Error "WindowsAppSDK runtime MSIX packages not found"; exit 1 }
        foreach ($msix in $msixFiles) {
          Write-Host "  Installing: $($msix.Name)"
          Add-AppxPackage -Path $msix.FullName -ErrorAction SilentlyContinue
        }
    - name: Run Tests
      shell: pwsh
      run: |
        dotnet test ${{ inputs.test-project }} `
          -f ${{ inputs.target-framework }} `
          -c ${{ inputs.configuration }} `
          --filter "Category!=ExpectedFailure" `
          --logger "trx;LogFileName=test-results.trx" `
          /bl:./artifacts/logs/msbuild-test.binlog
    - name: Clean up build artifacts before upload
      if: always()
      shell: pwsh
      run: |
        Remove-Item -Recurse -Force ./artifacts/bin -ErrorAction SilentlyContinue
        Remove-Item -Recurse -Force ./artifacts/obj -ErrorAction SilentlyContinue
    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ./artifacts
