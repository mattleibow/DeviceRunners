  # ============================================================
  # TCP Android Test
  # ============================================================
  tcp-android:
    strategy:
      fail-fast: false
      matrix:
        platform: 
          - name: Linux
            os: ubuntu-24.04
            gpu: swiftshader_indirect
            emulator-image: system-images;android-36;google_apis;x86_64
            runtime-identifier: android-x64
          - name: macOS
            os: macos-15-arm64
            gpu: guest
            emulator-image: system-images;android-36;google_apis;arm64-v8a
            runtime-identifier: android-arm64
    name: TCP Android (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    env:
      TEST_TARGET_FRAMEWORK: net10.0-android
      TEST_RUNTIME_IDENTIFIER: ${{ matrix.platform.runtime-identifier }}
      TEST_CONFIGURATION: release
      TEST_EMULATOR_NAME: TCPTestEmulator
      TEST_EMULATOR_IMAGE: ${{ matrix.platform.emulator-image }}
      ANDROID_AVD_HOME: ${{ github.workspace }}/.android/avd
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Required Tools
      uses: ./.github/workflows/setup-tools
    - uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '21'
    - name: Build and Install CLI Tool
      run: |
        dotnet pack src/DeviceRunners.Cli/DeviceRunners.Cli.csproj -c release
        dotnet tool install --global --add-source artifacts/package/release DeviceRunners.Cli
    - name: Install Android SDK Packages
      run: |
        set -e
        SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
        echo "=== SDK Manager: $SDKMANAGER ==="
        $SDKMANAGER --version
        yes | $SDKMANAGER --licenses > /dev/null 2>&1 || true
        echo "=== Installing packages ==="
        $SDKMANAGER --install \
          'platform-tools' \
          'emulator' \
          '${{ env.TEST_EMULATOR_IMAGE }}'
        echo "=== Installed packages ==="
        $SDKMANAGER --list_installed 2>/dev/null | grep -E 'system-images|emulator|platform-tools' || \
          $SDKMANAGER --list 2>/dev/null | grep -E 'Installed|system-images.*android-36|emulator|platform-tools' | head -20
    - name: Create Emulator
      run: |
        set -e
        AVDMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/avdmanager"
        echo "=== AVD Manager: $AVDMANAGER ==="
        echo "=== Creating AVD: ${{ env.TEST_EMULATOR_NAME }} ==="
        mkdir -p "$ANDROID_AVD_HOME"
        echo "ANDROID_AVD_HOME=$ANDROID_AVD_HOME"
        echo no | $AVDMANAGER create avd \
          -n "${{ env.TEST_EMULATOR_NAME }}" \
          -k "${{ env.TEST_EMULATOR_IMAGE }}" \
          --force
        echo "=== Verifying AVD was created ==="
        $AVDMANAGER list avd
        $AVDMANAGER list avd | grep -q "${{ env.TEST_EMULATOR_NAME }}" || { echo "ERROR: AVD not found!"; exit 1; }
    - name: Enable KVM
      if: runner.os == 'Linux'
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm
    - name: Start Emulator
      run: |
        set -e
        echo "=== Starting emulator ==="
        nohup $ANDROID_SDK_ROOT/emulator/emulator \
          -avd ${{ env.TEST_EMULATOR_NAME }} \
          -gpu ${{ matrix.platform.gpu }} \
          -no-window -no-snapshot -no-audio -no-boot-anim \
          > /tmp/emulator.log 2>&1 &
        EMULATOR_PID=$!
        echo "Emulator PID: $EMULATOR_PID"
        sleep 10
        echo "=== Emulator log (first 50 lines) ==="
        head -50 /tmp/emulator.log || true
    - name: Wait for Emulator
      run: |
        set -e
        ADB="$ANDROID_SDK_ROOT/platform-tools/adb"
        SECONDS=0
        TIMEOUT=300

        # Start streaming emulator log in background so we can see what's happening
        tail -f /tmp/emulator.log 2>/dev/null &
        TAIL_PID=$!

        # Poll for ADB device (don't use wait-for-device as it blocks without output)
        echo "=== Polling for ADB device ==="
        while ! $ADB devices 2>/dev/null | grep -q "emulator"; do
          if [ $SECONDS -gt $TIMEOUT ]; then
            echo "ERROR: No emulator device found after ${TIMEOUT}s"
            kill $TAIL_PID 2>/dev/null || true
            exit 1
          fi
          echo "[${SECONDS}s] No emulator device yet, retrying..."
          sleep 5
        done
        echo "=== ADB device found (${SECONDS}s) ==="
        $ADB devices -l

        # Poll for boot_completed
        echo "=== Polling for sys.boot_completed ==="
        while [ "$($ADB shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" != "1" ]; do
          if [ $SECONDS -gt $TIMEOUT ]; then
            echo "ERROR: Emulator boot timed out after ${TIMEOUT}s"
            kill $TAIL_PID 2>/dev/null || true
            exit 1
          fi
          echo "[${SECONDS}s] Waiting for boot_completed..."
          sleep 5
        done

        # Stop streaming log
        kill $TAIL_PID 2>/dev/null || true

        echo "=== Emulator is ready (took ${SECONDS}s) ==="
        $ADB shell getprop ro.build.version.sdk
        $ADB shell getprop ro.product.cpu.abi
    - name: Publish App
      run: |
        dotnet publish sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj \
          -f ${{ env.TEST_TARGET_FRAMEWORK }} \
          -r ${{ env.TEST_RUNTIME_IDENTIFIER }} \
          -c ${{ env.TEST_CONFIGURATION }} \
          -p:TestingMode=NonInteractiveVisual \
          -p:AndroidSdkDirectory=$ANDROID_SDK_ROOT \
          /bl:./artifacts/logs/msbuild-publish.binlog
    - name: Run Tests
      run: |
        device-runners android test \
          --app artifacts/bin/DeviceTestingKitApp.DeviceTests/${{ env.TEST_CONFIGURATION }}_${{ env.TEST_TARGET_FRAMEWORK }}_${{ env.TEST_RUNTIME_IDENTIFIER }}/com.companyname.devicetestingkitapp.devicetests-Signed.apk \
          --results-directory artifacts/test-results
    - name: Shutdown the Emulator
      if: always()
      run: |
        $ANDROID_SDK_ROOT/platform-tools/adb emu kill || true
        echo "=== Final emulator log (last 30 lines) ==="
        tail -30 /tmp/emulator.log 2>/dev/null || true
    - name: Clean up build artifacts before upload
      run: |
        rm -rf ./artifacts/bin
        rm -rf ./artifacts/obj
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: Test Results (TCP) - Android (${{ matrix.platform.name }})
        path: ./artifacts

  # ============================================================
  # TCP iOS Test
  # ============================================================
  tcp-ios:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: x64
            os: macos-15
            runtime-identifier: iossimulator-x64
          - name: arm64
            os: macos-15-arm64
            runtime-identifier: iossimulator-arm64
    name: TCP iOS (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    env:
      TEST_TARGET_FRAMEWORK: net10.0-ios
      TEST_RUNTIME_IDENTIFIER: ${{ matrix.platform.runtime-identifier }}
      TEST_CONFIGURATION: debug
      TEST_SIMULATOR_NAME: TCPTestSimulator
      TEST_SIMULATOR_DEVICE_TYPE: iPhone 16
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Required Tools
      uses: ./.github/workflows/setup-tools
    - name: Build and Install CLI Tool
      run: |
        dotnet pack src/DeviceRunners.Cli/DeviceRunners.Cli.csproj -c release
        dotnet tool install --global --add-source artifacts/package/release DeviceRunners.Cli
    - name: List Available Simulators
      run: dotnet apple simulator list
    - name: Create Simulator
      run: dotnet apple simulator create "${{ env.TEST_SIMULATOR_NAME }}" --device-type "${{ env.TEST_SIMULATOR_DEVICE_TYPE }}"
    - name: Boot Simulator
      run: dotnet apple simulator boot "${{ env.TEST_SIMULATOR_NAME }}" --wait
    - name: Publish App
      run: |
        dotnet build sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj \
          -f ${{ env.TEST_TARGET_FRAMEWORK }} \
          -r ${{ env.TEST_RUNTIME_IDENTIFIER }} \
          -c ${{ env.TEST_CONFIGURATION }} \
          -p:TestingMode=NonInteractiveVisual \
          /bl:./artifacts/logs/msbuild-publish.binlog
    - name: Run Tests
      run: |
        app_bundle=$(find artifacts/bin/DeviceTestingKitApp.DeviceTests/${{ env.TEST_CONFIGURATION }}_${{ env.TEST_TARGET_FRAMEWORK }}_${{ env.TEST_RUNTIME_IDENTIFIER }} -name "*.app" -type d)
        echo "Found app bundle: $app_bundle"
        device-runners ios test --app "$app_bundle" --device "${{ env.TEST_SIMULATOR_NAME }}" --results-directory artifacts/test-results
    - name: Shutdown Simulator
      if: always()
      run: |
        dotnet apple simulator shutdown "${{ env.TEST_SIMULATOR_NAME }}"
        dotnet apple simulator delete "${{ env.TEST_SIMULATOR_NAME }}"
    - name: Clean up build artifacts before upload
      run: |
        rm -rf ./artifacts/bin
        rm -rf ./artifacts/obj
      if: ${{ always() }}
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: Test Results (TCP) - iOS (${{ matrix.platform.name }})
        path: ./artifacts

  # ============================================================
  # TCP macOS Test
  # ============================================================
  tcp-macos:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: x64
            os: macos-15
            runtime-identifier: maccatalyst-x64
          - name: arm64
            os: macos-15-arm64
            runtime-identifier: maccatalyst-arm64
    name: TCP macOS (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    env:
      TEST_TARGET_FRAMEWORK: net10.0-maccatalyst
      TEST_RUNTIME_IDENTIFIER: ${{ matrix.platform.runtime-identifier }}
      TEST_CONFIGURATION: release
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Required Tools
      uses: ./.github/workflows/setup-tools
    - name: Build and Install CLI Tool
      run: |
        dotnet pack src/DeviceRunners.Cli/DeviceRunners.Cli.csproj -c release
        dotnet tool install --global --add-source artifacts/package/release DeviceRunners.Cli
    - name: Publish App
      run: |
        dotnet publish sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj \
          -f ${{ env.TEST_TARGET_FRAMEWORK }} \
          -r ${{ env.TEST_RUNTIME_IDENTIFIER }} \
          -c ${{ env.TEST_CONFIGURATION }} \
          -p:TestingMode=NonInteractiveVisual \
          /bl:./artifacts/logs/msbuild-publish.binlog
    - name: Run Tests
      run: |
        app_bundle=$(find artifacts/bin/DeviceTestingKitApp.DeviceTests/${{ env.TEST_CONFIGURATION }}_${{ env.TEST_TARGET_FRAMEWORK }}_${{ env.TEST_RUNTIME_IDENTIFIER }} -name "*.app" -type d)
        device-runners macos test --app "$app_bundle" --results-directory artifacts/test-results
    - name: Clean up build artifacts before upload
      run: |
        rm -rf ./artifacts/bin
        rm -rf ./artifacts/obj
      if: ${{ always() }}
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: Test Results (TCP) - macOS (${{ matrix.platform.name }})
        path: ./artifacts

  # ============================================================
  # TCP Windows Test
  # ============================================================
  tcp-windows:
    name: TCP Windows
    runs-on: windows-2025
    env:
      TEST_TARGET_FRAMEWORK: net10.0-windows10.0.19041.0
      TEST_RUNTIME_IDENTIFIER: win10-x64
      TEST_CONFIGURATION: release
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Required Tools
      uses: ./.github/workflows/setup-tools
    - name: Build and Install CLI Tool
      run: |
        dotnet pack src/DeviceRunners.Cli/DeviceRunners.Cli.csproj -c release
        dotnet tool install --global --add-source artifacts/package/release DeviceRunners.Cli
    - name: Publish App
      run: |
        $certResult = device-runners windows cert install --project sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj --output Json
        $fingerprint = ($certResult | ConvertFrom-Json).Thumbprint
        dotnet publish sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj `
          -f ${{ env.TEST_TARGET_FRAMEWORK }} `
          -c ${{ env.TEST_CONFIGURATION }} `
          -p:TestingMode=NonInteractiveVisual `
          -p:AppxPackageSigningEnabled=true `
          -p:PackageCertificateThumbprint=$fingerprint `
          -p:PackageCertificateKeyFile="" `
          /bl:./artifacts/logs/msbuild-publish.binlog
        device-runners windows cert uninstall --fingerprint $fingerprint
    - name: Run Tests
      run: |
        $msix = (Get-ChildItem -Recurse -Filter "*.msix" -Path "sample/test/DeviceTestingKitApp.DeviceTests/AppPackages","artifacts" | Select-Object -First 1).FullName
        device-runners windows test --app $msix --results-directory artifacts/test-results
    - name: Clean up build artifacts before upload
      run: |
        Remove-Item -Recurse -Force ./artifacts/bin -ErrorAction SilentlyContinue
        Remove-Item -Recurse -Force ./artifacts/obj -ErrorAction SilentlyContinue
      if: ${{ always() }}
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: Test Results (TCP) - Windows
        path: ./artifacts

  # ============================================================
  # TCP Windows Test (Unpackaged)
  # ============================================================
  tcp-windows-unpackaged:
    name: TCP Windows (Unpackaged)
    runs-on: windows-2025
    env:
      TEST_TARGET_FRAMEWORK: net10.0-windows10.0.19041.0
      TEST_RUNTIME_IDENTIFIER: win10-x64
      TEST_CONFIGURATION: release
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Required Tools
      uses: ./.github/workflows/setup-tools
    - name: Build and Install CLI Tool
      run: |
        dotnet pack src/DeviceRunners.Cli/DeviceRunners.Cli.csproj -c release
        dotnet tool install --global --add-source artifacts/package/release DeviceRunners.Cli
    - name: Publish App as Unpackaged Executable
      run: |
        dotnet publish sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj `
          -f ${{ env.TEST_TARGET_FRAMEWORK }} `
          -c ${{ env.TEST_CONFIGURATION }} `
          -p:TestingMode=NonInteractiveVisual `
          -p:WindowsPackageType=None `
          --output artifacts/publish `
          /bl:./artifacts/logs/msbuild-publish-unpackaged.binlog
    - name: Run Tests with Unpackaged App
      run: |
        $exe = Get-ChildItem "artifacts/publish/DeviceTestingKitApp.DeviceTests.exe"
        device-runners windows test --app $exe --results-directory artifacts/test-results
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: Test Results (TCP) - Windows Unpackaged
        path: ./artifacts

  # ============================================================
  # XHarness Android Test
  # ============================================================
  xharness-android:
    strategy:
      fail-fast: false
      matrix:
        platform: 
          - name: Linux
            os: ubuntu-24.04
