name: CI

on:
  pull_request:
    paths-ignore:
      - '.azure/**'
  push:
    branches: [ main, 'releases/**' ]
    paths-ignore:
      - '.azure/**'
  release:
    types: [ published ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ============================================================
  # Build
  # ============================================================
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            os: windows-2025
          - name: macOS
            os: macos-15-intel
        configuration:
          - debug
          - release
        exclude:
          - platform:
              name: macOS
            configuration: release
    name: Build - ${{ matrix.platform.name }} (${{ matrix.configuration }})
    runs-on: ${{ matrix.platform.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Required Tools
      uses: ./.github/workflows/setup-tools
    - name: Build
      run: dotnet build DeviceRunners.sln --configuration ${{ matrix.configuration }} /bl:./artifacts/logs/msbuild-build.binlog
    - name: Upload Logs
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: Logs - Build ${{ matrix.platform.name }} (${{ matrix.configuration }})
        path: ./artifacts/logs

  # ============================================================
  # Test
  # ============================================================
  test:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            os: windows-2025
          - name: macOS
            os: macos-15-intel
    name: Test - ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Required Tools
      uses: ./.github/workflows/setup-tools
    - name: Test
      run: dotnet test test/DeviceRunners.VisualRunners.Tests --configuration release /bl:./artifacts/logs/msbuild-test.binlog
    - name: Upload Logs
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: Logs - Test ${{ matrix.platform.name }}
        path: ./artifacts/logs

  # ============================================================
  # Pack
  # ============================================================
  pack:
    name: Pack
    env:
      NUPKG_MAJOR: 0.999
    runs-on: windows-2025
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Required Tools
      uses: ./.github/workflows/setup-tools
    - name: Package NuGets
      shell: pwsh
      run: |
        $VERSION="$env:NUPKG_MAJOR-ci.$env:GITHUB_RUN_ID"
        if ($env:GITHUB_EVENT_NAME -eq "release") {
          $VERSION = $env:GITHUB_REF.Substring($env:GITHUB_REF.LastIndexOf('/') + 1)
        }
        echo "PACKAGE VERSION: $VERSION"
  #       
  #       dotnet pack --output ./artifacts/nugets --configuration release -p:PackageVersion=$VERSION /bl:./artifacts/logs/msbuild-pack.binlog
  #   - name: Upload NuGet Artifacts
  #     uses: actions/upload-artifact@v4
  #     with:
  #       name: NuGet
  #       path: ./artifacts/nugets
  #   - name: Upload Logs
  #     uses: actions/upload-artifact@v4
  #     if: ${{ always() }}
  #     with:
  #       name: Pack Logs - Windows
  #       path: ./artifacts/logs

  publish:
    name: Publish NuGet Packages
    needs: pack
    env:
      NUGET_URL: 'https://pkgs.dev.azure.com/mattleibow/OpenSource/_packaging/test-device-runners/nuget/v3/index.json'
    runs-on: windows-2025
    if: github.event_name == 'release'
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: NuGet
          path: artifacts
      - name: Validate Artifact Downloads
        run: dir artifacts
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          source-url: ${{ env.NUGET_URL }}
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.AZURE_DEVOPS_NUGET_TOKEN }} 
      - name: Push NuGet
        run: dotnet nuget push artifacts\*.nupkg --source $env:NUGET_URL --api-key AzureArtifacts

  # ============================================================
  # TCP Android Test
  # ============================================================
  tcp-android:
    strategy:
      fail-fast: false
      matrix:
        platform: 
          - name: Linux (API 36)
            os: ubuntu-24.04
            gpu: swiftshader_indirect
            emulator-image: system-images;android-36;google_apis;x86_64
            runtime-identifier: android-x64
            connection-timeout: 120
          - name: Linux (API 34)
            os: ubuntu-24.04
            gpu: swiftshader_indirect
            emulator-image: system-images;android-34;google_apis;x86_64
            runtime-identifier: android-x64
            connection-timeout: 120
          - name: Linux (API 24)
            os: ubuntu-24.04
            gpu: swiftshader_indirect
            emulator-image: system-images;android-24;google_apis;x86_64
            runtime-identifier: android-x64
            connection-timeout: 120
          - name: macOS (x64, API 36)
            os: macos-15-intel
            gpu: guest
            emulator-image: system-images;android-36;google_apis;x86_64
            runtime-identifier: android-x64
            connection-timeout: 300
          - name: macOS (x64, API 34)
            os: macos-15-intel
            gpu: guest
            emulator-image: system-images;android-34;google_apis;x86_64
            runtime-identifier: android-x64
            connection-timeout: 300
          - name: macOS (x64, API 24)
            os: macos-15-intel
            gpu: guest
            emulator-image: system-images;android-24;google_apis;x86_64
            runtime-identifier: android-x64
            connection-timeout: 300
          # NOTE: ARM64 Android emulation requires HVF which is not available on GitHub's macOS ARM runners
          # - name: macOS (arm64)
          #   os: macos-15
          #   gpu: host
          #   emulator-image: system-images;android-36;google_apis;arm64-v8a
          #   runtime-identifier: android-arm64
          #   connection-timeout: 120
    name: TCP Android (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    env:
      TEST_TARGET_FRAMEWORK: net10.0-android
      TEST_RUNTIME_IDENTIFIER: ${{ matrix.platform.runtime-identifier }}
      TEST_CONFIGURATION: release
      TEST_EMULATOR_NAME: TCPTestEmulator
      TEST_EMULATOR_IMAGE: ${{ matrix.platform.emulator-image }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Required Tools
      uses: ./.github/workflows/setup-tools
    - uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '21'
    - name: Build and Install CLI Tool
      run: |
        dotnet pack src/DeviceRunners.Cli/DeviceRunners.Cli.csproj -c release
        dotnet tool install --global --add-source artifacts/package/release DeviceRunners.Cli
    - name: Setup Android Emulator
      id: emulator
      uses: ./.github/workflows/setup-android-emulator
      with:
        emulator-name: ${{ env.TEST_EMULATOR_NAME }}
        emulator-image: ${{ env.TEST_EMULATOR_IMAGE }}
    - name: Publish App
      run: |
        dotnet publish sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj \
          -f ${{ env.TEST_TARGET_FRAMEWORK }} \
          -r ${{ env.TEST_RUNTIME_IDENTIFIER }} \
          -c ${{ env.TEST_CONFIGURATION }} \
          -p:TestingMode=NonInteractiveVisual \
          -p:AndroidSdkDirectory=$ANDROID_SDK_ROOT \
          /bl:./artifacts/logs/msbuild-publish.binlog
    - name: Wait for Android Emulator
      uses: ./.github/workflows/wait-android-emulator
      with:
        emulator-serial: ${{ steps.emulator.outputs.emulator-serial }}
        emulator-pid: ${{ steps.emulator.outputs.emulator-pid }}
    - name: Run Tests
      run: |
        device-runners android test \
          --app artifacts/bin/DeviceTestingKitApp.DeviceTests/${{ env.TEST_CONFIGURATION }}_${{ env.TEST_TARGET_FRAMEWORK }}_${{ env.TEST_RUNTIME_IDENTIFIER }}/com.companyname.devicetestingkitapp.devicetests-Signed.apk \
          --results-directory artifacts/test-results \
          --connection-timeout ${{ matrix.platform.connection-timeout }}
    - name: Teardown Android Emulator
      if: always()
      uses: ./.github/workflows/teardown-android-emulator
      with:
        emulator-serial: ${{ steps.emulator.outputs.emulator-serial }}
        emulator-pid: ${{ steps.emulator.outputs.emulator-pid }}
        logs-directory: artifacts/logs
    - name: Clean up build artifacts before upload
      run: |
        rm -rf ./artifacts/bin
        rm -rf ./artifacts/obj
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: Test Results (TCP) - Android (${{ matrix.platform.name }})
        path: ./artifacts

  # ============================================================
  # TCP iOS Test
  # ============================================================
  tcp-ios:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: x64
            os: macos-15-intel
            runtime-identifier: iossimulator-x64
          - name: arm64
            os: macos-15
            runtime-identifier: iossimulator-arm64
    name: TCP iOS (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    env:
      TEST_TARGET_FRAMEWORK: net10.0-ios
      TEST_RUNTIME_IDENTIFIER: ${{ matrix.platform.runtime-identifier }}
      TEST_CONFIGURATION: debug
      TEST_SIMULATOR_DEVICE_TYPE: iPhone 16
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Required Tools
      uses: ./.github/workflows/setup-tools
    - name: Build and Install CLI Tool
      run: |
        dotnet pack src/DeviceRunners.Cli/DeviceRunners.Cli.csproj -c release
        dotnet tool install --global --add-source artifacts/package/release DeviceRunners.Cli
    - name: Setup iOS Simulator
      id: simulator
      uses: ./.github/workflows/setup-ios-simulator
      with:
        device-type: ${{ env.TEST_SIMULATOR_DEVICE_TYPE }}
    - name: Publish App
      run: |
        dotnet build sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj \
          -f ${{ env.TEST_TARGET_FRAMEWORK }} \
          -r ${{ env.TEST_RUNTIME_IDENTIFIER }} \
          -c ${{ env.TEST_CONFIGURATION }} \
          -p:TestingMode=NonInteractiveVisual \
          /bl:./artifacts/logs/msbuild-publish.binlog
    - name: Wait for iOS Simulator
      uses: ./.github/workflows/wait-ios-simulator
      with:
        simulator-udid: ${{ steps.simulator.outputs.simulator-udid }}
    - name: Run Tests
      run: |
        app_bundle=$(find artifacts/bin/DeviceTestingKitApp.DeviceTests/${{ env.TEST_CONFIGURATION }}_${{ env.TEST_TARGET_FRAMEWORK }}_${{ env.TEST_RUNTIME_IDENTIFIER }} -name "*.app" -type d)
        echo "Found app bundle: $app_bundle"
        device-runners ios test --app "$app_bundle" --device "${{ steps.simulator.outputs.simulator-udid }}" --results-directory artifacts/test-results
    - name: Teardown iOS Simulator
      if: always()
      uses: ./.github/workflows/teardown-ios-simulator
      with:
        simulator-udid: ${{ steps.simulator.outputs.simulator-udid }}
        log-stream-pid: ${{ steps.simulator.outputs.log-stream-pid }}
        logs-directory: artifacts/logs
    - name: Clean up build artifacts before upload
      run: |
        rm -rf ./artifacts/bin
        rm -rf ./artifacts/obj
      if: ${{ always() }}
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: Test Results (TCP) - iOS (${{ matrix.platform.name }})
        path: ./artifacts

  # ============================================================
  # TCP macOS Test
  # ============================================================
  tcp-macos:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: x64
            os: macos-15-intel
            runtime-identifier: maccatalyst-x64
            configuration: release
          - name: arm64
            os: macos-15
            runtime-identifier: maccatalyst-arm64
            configuration: debug
    name: TCP macOS (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    env:
      TEST_TARGET_FRAMEWORK: net10.0-maccatalyst
      TEST_RUNTIME_IDENTIFIER: ${{ matrix.platform.runtime-identifier }}
      TEST_CONFIGURATION: ${{ matrix.platform.configuration }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Required Tools
      uses: ./.github/workflows/setup-tools
    - name: Build and Install CLI Tool
      run: |
        dotnet pack src/DeviceRunners.Cli/DeviceRunners.Cli.csproj -c release
        dotnet tool install --global --add-source artifacts/package/release DeviceRunners.Cli
    - name: Publish App
      run: |
        dotnet publish sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj \
          -f ${{ env.TEST_TARGET_FRAMEWORK }} \
          -r ${{ env.TEST_RUNTIME_IDENTIFIER }} \
          -c ${{ env.TEST_CONFIGURATION }} \
          -p:TestingMode=NonInteractiveVisual \
          /bl:./artifacts/logs/msbuild-publish.binlog
    - name: Run Tests
      run: |
        app_bundle=$(find artifacts/bin/DeviceTestingKitApp.DeviceTests/${{ env.TEST_CONFIGURATION }}_${{ env.TEST_TARGET_FRAMEWORK }}_${{ env.TEST_RUNTIME_IDENTIFIER }} -name "*.app" -type d)
        device-runners macos test --app "$app_bundle" --results-directory artifacts/test-results
    - name: Clean up build artifacts before upload
      run: |
        rm -rf ./artifacts/bin
        rm -rf ./artifacts/obj
      if: ${{ always() }}
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: Test Results (TCP) - macOS (${{ matrix.platform.name }})
        path: ./artifacts

  # ============================================================
  # TCP Windows Test
  # ============================================================
  tcp-windows:
    name: TCP Windows
    runs-on: windows-2025
    env:
      TEST_TARGET_FRAMEWORK: net10.0-windows10.0.19041.0
      TEST_RUNTIME_IDENTIFIER: win10-x64
      TEST_CONFIGURATION: release
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Required Tools
      uses: ./.github/workflows/setup-tools
    - name: Build and Install CLI Tool
      run: |
        dotnet pack src/DeviceRunners.Cli/DeviceRunners.Cli.csproj -c release
        dotnet tool install --global --add-source artifacts/package/release DeviceRunners.Cli
    - name: Publish App
      run: |
        $certResult = device-runners windows cert install --project sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj --output Json
        $fingerprint = ($certResult | ConvertFrom-Json).Thumbprint
        dotnet publish sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj `
          -f ${{ env.TEST_TARGET_FRAMEWORK }} `
          -c ${{ env.TEST_CONFIGURATION }} `
          -p:TestingMode=NonInteractiveVisual `
          -p:AppxPackageSigningEnabled=true `
          -p:PackageCertificateThumbprint=$fingerprint `
          -p:PackageCertificateKeyFile="" `
          /bl:./artifacts/logs/msbuild-publish.binlog
        device-runners windows cert uninstall --fingerprint $fingerprint
    - name: Run Tests
      run: |
        $msix = (Get-ChildItem -Recurse -Filter "*.msix" -Path "sample/test/DeviceTestingKitApp.DeviceTests/AppPackages","artifacts" | Select-Object -First 1).FullName
        device-runners windows test --app $msix --results-directory artifacts/test-results
    - name: Clean up build artifacts before upload
      run: |
        Remove-Item -Recurse -Force ./artifacts/bin -ErrorAction SilentlyContinue
        Remove-Item -Recurse -Force ./artifacts/obj -ErrorAction SilentlyContinue
      if: ${{ always() }}
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: Test Results (TCP) - Windows
        path: ./artifacts

  # ============================================================
  # TCP Windows Test (Unpackaged)
  # ============================================================
  tcp-windows-unpackaged:
    name: TCP Windows (Unpackaged)
    runs-on: windows-2025
    env:
      TEST_TARGET_FRAMEWORK: net10.0-windows10.0.19041.0
      TEST_RUNTIME_IDENTIFIER: win10-x64
      TEST_CONFIGURATION: release
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Required Tools
      uses: ./.github/workflows/setup-tools
    - name: Build and Install CLI Tool
      run: |
        dotnet pack src/DeviceRunners.Cli/DeviceRunners.Cli.csproj -c release
        dotnet tool install --global --add-source artifacts/package/release DeviceRunners.Cli
    - name: Publish App as Unpackaged Executable
      run: |
        dotnet publish sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj `
          -f ${{ env.TEST_TARGET_FRAMEWORK }} `
          -c ${{ env.TEST_CONFIGURATION }} `
          -p:TestingMode=NonInteractiveVisual `
          -p:WindowsPackageType=None `
          --output artifacts/publish `
          /bl:./artifacts/logs/msbuild-publish-unpackaged.binlog
    - name: Run Tests with Unpackaged App
      run: |
        $exe = Get-ChildItem "artifacts/publish/DeviceTestingKitApp.DeviceTests.exe"
        device-runners windows test --app $exe --results-directory artifacts/test-results
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: Test Results (TCP) - Windows Unpackaged
        path: ./artifacts

  # ============================================================
  # XHarness Android Test
  # ============================================================
  xharness-android:
    strategy:
      fail-fast: false
      matrix:
        platform: 
          - name: Linux (API 36)
            os: ubuntu-24.04
            gpu: swiftshader_indirect
            emulator-image: system-images;android-36;google_apis;x86_64
            runtime-identifier: android-x64
          - name: Linux (API 34)
            os: ubuntu-24.04
            gpu: swiftshader_indirect
            emulator-image: system-images;android-34;google_apis;x86_64
            runtime-identifier: android-x64
          - name: Linux (API 24)
            os: ubuntu-24.04
            gpu: swiftshader_indirect
            emulator-image: system-images;android-24;google_apis;x86_64
            runtime-identifier: android-x64
          - name: macOS (x64, API 36)
            os: macos-15-intel
            gpu: guest
            emulator-image: system-images;android-36;google_apis;x86_64
            runtime-identifier: android-x64
          - name: macOS (x64, API 34)
            os: macos-15-intel
            gpu: guest
            emulator-image: system-images;android-34;google_apis;x86_64
            runtime-identifier: android-x64
          - name: macOS (x64, API 24)
            os: macos-15-intel
            gpu: guest
            emulator-image: system-images;android-24;google_apis;x86_64
            runtime-identifier: android-x64
          # NOTE: ARM64 Android emulation requires HVF which is not available on GitHub's macOS ARM runners
          # - name: macOS (arm64, API 36)
          #   os: macos-15
          #   gpu: host
          #   emulator-image: system-images;android-36;google_apis;arm64-v8a
          #   runtime-identifier: android-arm64
    name: XHarness Android (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    env:
      TEST_TARGET_FRAMEWORK: net10.0-android
      TEST_RUNTIME_IDENTIFIER: ${{ matrix.platform.runtime-identifier }}
      TEST_CONFIGURATION: release
      TEST_EMULATOR_NAME: XHarnessEmulator
      TEST_EMULATOR_IMAGE: ${{ matrix.platform.emulator-image }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Required Tools
      uses: ./.github/workflows/setup-tools
    - uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '21'
    - name: Setup Android Emulator
      id: emulator
      uses: ./.github/workflows/setup-android-emulator
      with:
        emulator-name: ${{ env.TEST_EMULATOR_NAME }}
        emulator-image: ${{ env.TEST_EMULATOR_IMAGE }}
    - name: Publish App
      run: |
        dotnet publish sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj \
          -f ${{ env.TEST_TARGET_FRAMEWORK }} \
          -r ${{ env.TEST_RUNTIME_IDENTIFIER }} \
          -c ${{ env.TEST_CONFIGURATION }} \
          -p:TestingMode=XHarness \
          -p:AndroidSdkDirectory=$ANDROID_SDK_ROOT \
          /bl:./artifacts/logs/msbuild-publish.binlog
    - name: Wait for Android Emulator
      uses: ./.github/workflows/wait-android-emulator
      with:
        emulator-serial: ${{ steps.emulator.outputs.emulator-serial }}
        emulator-pid: ${{ steps.emulator.outputs.emulator-pid }}
    - name: Run Tests
      run: |
        for i in $(seq 1 3)
        do
          echo "=== XHarness attempt $i ==="
          dotnet xharness android test \
            --timeout="00:10:00" \
            --launch-timeout=00:10:00 \
            --package-name com.companyname.devicetestingkitapp.devicetests \
            --instrumentation devicerunners.xharness.maui.XHarnessInstrumentation \
            --app artifacts/bin/DeviceTestingKitApp.DeviceTests/${{ env.TEST_CONFIGURATION }}_${{ env.TEST_TARGET_FRAMEWORK }}_${{ env.TEST_RUNTIME_IDENTIFIER }}/com.companyname.devicetestingkitapp.devicetests-Signed.apk \
            --output-directory artifacts/test-results \
            --verbosity=Debug \
          && code=0 && break || code=$?
          echo "=== Attempt $i failed with exit code $code ==="
          echo "=== Logcat tail after failure ==="
          $ANDROID_HOME/platform-tools/adb -s ${{ steps.emulator.outputs.emulator-serial }} logcat -d -t 100 2>/dev/null || true
          echo "=== System load ==="
          $ANDROID_HOME/platform-tools/adb -s ${{ steps.emulator.outputs.emulator-serial }} shell cat /proc/loadavg 2>/dev/null || true
          echo "=== Waiting 30s before retry ==="
          sleep 30
        done
        exit $code
    - name: Teardown Android Emulator
      if: always()
      uses: ./.github/workflows/teardown-android-emulator
      with:
        emulator-serial: ${{ steps.emulator.outputs.emulator-serial }}
        emulator-pid: ${{ steps.emulator.outputs.emulator-pid }}
        logs-directory: artifacts/logs
    - name: Clean up build artifacts before upload
      run: |
        rm -rf ./artifacts/bin
        rm -rf ./artifacts/obj
      if: ${{ always() }}
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: Test Results (XHarness) - Android (${{ matrix.platform.name }})
        path: ./artifacts

  # ============================================================
  # XHarness iOS Test
  # ============================================================
  xharness-ios:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: x64
            os: macos-15-intel
            runtime-identifier: iossimulator-x64
          - name: arm64
            os: macos-15
            runtime-identifier: iossimulator-arm64
    name: XHarness iOS (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    env:
      TEST_TARGET_FRAMEWORK: net10.0-ios
      TEST_RUNTIME_IDENTIFIER: ${{ matrix.platform.runtime-identifier }}
      TEST_CONFIGURATION: debug
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Required Tools
      uses: ./.github/workflows/setup-tools
    - name: Setup iOS Simulator
      id: simulator
      uses: ./.github/workflows/setup-ios-simulator
    - name: Publish App
      run: |
        dotnet build sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj \
          -f ${{ env.TEST_TARGET_FRAMEWORK }} \
          -r ${{ env.TEST_RUNTIME_IDENTIFIER }} \
          -c ${{ env.TEST_CONFIGURATION }} \
          -p:TestingMode=XHarness \
          /bl:./artifacts/logs/msbuild-publish.binlog
    - name: Wait for iOS Simulator
      uses: ./.github/workflows/wait-ios-simulator
      with:
        simulator-udid: ${{ steps.simulator.outputs.simulator-udid }}
    - name: Run Tests
      run: |
        for i in $(seq 1 3)
        do
          dotnet xharness apple test \
            --target ios-simulator-64 \
            --device "${{ steps.simulator.outputs.simulator-udid }}" \
            --timeout="00:10:00" \
            --launch-timeout=00:10:00 \
            --app artifacts/bin/DeviceTestingKitApp.DeviceTests/${{ env.TEST_CONFIGURATION }}_${{ env.TEST_TARGET_FRAMEWORK }}_${{ env.TEST_RUNTIME_IDENTIFIER }}/DeviceTestingKitApp.DeviceTests.app \
            --output-directory artifacts/test-results \
          && code=0 && break || code=$? && sleep 15
        done
        exit $code
    - name: Teardown iOS Simulator
      if: always()
      uses: ./.github/workflows/teardown-ios-simulator
      with:
        simulator-udid: ${{ steps.simulator.outputs.simulator-udid }}
        log-stream-pid: ${{ steps.simulator.outputs.log-stream-pid }}
        logs-directory: artifacts/logs
    - name: Clean up build artifacts before upload
      run: |
        rm -rf ./artifacts/bin
        rm -rf ./artifacts/obj
      if: ${{ always() }}
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: Test Results (XHarness) - iOS (${{ matrix.platform.name }})
        path: ./artifacts

  # ============================================================
  # XHarness Mac Catalyst Test
  # ============================================================
  xharness-maccatalyst:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: x64
            os: macos-15-intel
            runtime-identifier: maccatalyst-x64
          - name: arm64
            os: macos-15
            runtime-identifier: maccatalyst-arm64
    name: XHarness Mac Catalyst (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    env:
      TEST_TARGET_FRAMEWORK: net10.0-maccatalyst
      TEST_RUNTIME_IDENTIFIER: ${{ matrix.platform.runtime-identifier }}
      TEST_CONFIGURATION: debug
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Required Tools
      uses: ./.github/workflows/setup-tools
    - name: Publish App
      run: |
        dotnet build sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj \
          -f ${{ env.TEST_TARGET_FRAMEWORK }} \
          -r ${{ env.TEST_RUNTIME_IDENTIFIER }} \
          -c ${{ env.TEST_CONFIGURATION }} \
          -p:TestingMode=XHarness \
          /bl:./artifacts/logs/msbuild-publish.binlog
    - name: Run Tests
      run: |
        dotnet xharness apple test \
          --target maccatalyst \
          --timeout="00:02:00" \
          --launch-timeout=00:06:00 \
          --app artifacts/bin/DeviceTestingKitApp.DeviceTests/${{ env.TEST_CONFIGURATION }}_${{ env.TEST_TARGET_FRAMEWORK }}_${{ env.TEST_RUNTIME_IDENTIFIER }}/DeviceTestingKitApp.DeviceTests.app \
          --output-directory artifacts/test-results
    - name: Clean up build artifacts before upload
      run: |
        rm -rf ./artifacts/bin
        rm -rf ./artifacts/obj
      if: ${{ always() }}
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: Test Results (XHarness) - Mac Catalyst (${{ matrix.platform.name }})
        path: ./artifacts

  # ============================================================
  # XHarness Windows Test
  # ============================================================
  xharness-windows:
    name: XHarness Windows
    runs-on: windows-2025
    env:
      TEST_TARGET_FRAMEWORK: net10.0-windows10.0.19041.0
      TEST_RUNTIME_IDENTIFIER: win10-x64
      TEST_CONFIGURATION: release
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Required Tools
      uses: ./.github/workflows/setup-tools
    - name: Publish App
      run: |
        $fingerprint = ./scripts/New-Certificate.ps1 -Project sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj
        dotnet publish sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj `
          -f ${{ env.TEST_TARGET_FRAMEWORK }} `
          -c ${{ env.TEST_CONFIGURATION }} `
          -p:TestingMode=XHarness `
          -p:AppxPackageSigningEnabled=true `
          -p:PackageCertificateThumbprint=$fingerprint `
          -p:PackageCertificateKeyFile="" `
          /bl:./artifacts/logs/msbuild-publish.binlog
        ./scripts/Remove-Certificate.ps1 -CertificateFingerprint $fingerprint
    - name: Run Tests
      shell: powershell
      run: |
        $msix = (Get-ChildItem -Recurse -Filter "*.msix" -Path "sample/test/DeviceTestingKitApp.DeviceTests/AppPackages","artifacts" | Select-Object -First 1).FullName
        ./scripts/Start-Tests.ps1 `
          -App $msix `
          -OutputDirectory artifacts/test-results `
          -TestingMode XHarness
    - name: Clean up build artifacts before upload
      run: |
        Remove-Item -Recurse -Force ./artifacts/bin -ErrorAction SilentlyContinue
        Remove-Item -Recurse -Force ./artifacts/obj -ErrorAction SilentlyContinue
      if: ${{ always() }}
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: Test Results (XHarness) - Windows
        path: ./artifacts
