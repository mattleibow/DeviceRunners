            runtime-identifier: iossimulator-x64
          - name: arm64
            os: macos-15-arm64
            runtime-identifier: iossimulator-arm64
    name: XHarness iOS (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    env:
      TEST_TARGET_FRAMEWORK: net10.0-ios
      TEST_RUNTIME_IDENTIFIER: ${{ matrix.platform.runtime-identifier }}
      TEST_CONFIGURATION: debug
    steps:
    - name: Checkout
      uses: actions/checkout@v4
