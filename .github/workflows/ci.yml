name: CI

on:
  pull_request:
  push:
    branches: [ main, 'releases/**' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Build ──────────────────────────────────────────────────

  build:
    name: Build - ${{ matrix.os-name }} (${{ matrix.configuration }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - runner: windows-2025
          os-name: Windows
          configuration: debug
        - runner: windows-2025
          os-name: Windows
          configuration: release
        - runner: macos-15-intel
          os-name: macOS
          configuration: debug
    steps:
    - uses: actions/checkout@v4
    - uses: ./.github/workflows/setup-tools
    - run: dotnet build DeviceRunners.slnx --configuration ${{ matrix.configuration }} /bl:./artifacts/logs/msbuild-build.binlog
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Logs - Build ${{ matrix.os-name }} (${{ matrix.configuration }})
        path: ./artifacts/logs

  # ── Unit Tests ─────────────────────────────────────────────

  test:
    name: Test - ${{ matrix.os-name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - runner: windows-2025
          os-name: Windows
        - runner: macos-15-intel
          os-name: macOS
        - runner: ubuntu-24.04
          os-name: Linux
    steps:
    - uses: actions/checkout@v4
    - uses: ./.github/workflows/setup-tools
    - run: dotnet test test/Tests.slnx --configuration release --logger "trx;LogFileName=test-results.trx" --results-directory ./artifacts/test-results /bl:./artifacts/logs/msbuild-test.binlog
    - name: Test Report
      uses: dorny/test-reporter@v2
      if: (always() && !cancelled())
      with:
        name: Test Results (${{ matrix.os-name }})
        path: ./artifacts/test-results/*.trx
        reporter: dotnet-trx
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Logs - Test ${{ matrix.os-name }}
        path: ./artifacts/logs

  # ── Pack ────────────────────────────────────────────────────

  pack:
    name: Pack
    runs-on: windows-2025
    steps:
    - uses: actions/checkout@v4
    - uses: ./.github/workflows/setup-tools
    - name: Package NuGets
      shell: pwsh
      run: |
        $VERSION="0.999-ci.$env:GITHUB_RUN_ID"
        echo "PACKAGE VERSION: $VERSION"
        dotnet pack --output ./artifacts/nugets --configuration release -p:PackageVersion=$VERSION /bl:./artifacts/logs/msbuild-pack.binlog
    - uses: actions/upload-artifact@v4
      with:
        name: NuGet
        path: ./artifacts/nugets
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Pack Logs
        path: ./artifacts/logs

  # ── TCP Device Tests ───────────────────────────────────────

  tcp-android:
    name: TCP Android (Linux)
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - uses: ./.github/workflows/test-tcp-android-linux
    - name: Test Report
      uses: dorny/test-reporter@v2
      if: (always() && !cancelled())
      with:
        name: Test Results (TCP Android)
        path: ./artifacts/test-results/*.trx
        reporter: dotnet-trx
        fail-on-empty: 'false'

  tcp-ios:
    name: TCP iOS (x64)
    runs-on: macos-15-intel
    steps:
    - uses: actions/checkout@v4
    - uses: ./.github/workflows/test-tcp-ios
    - name: Test Report
      uses: dorny/test-reporter@v2
