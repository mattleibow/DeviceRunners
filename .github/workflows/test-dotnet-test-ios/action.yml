name: 'dotnet test iOS'
description: 'Run device tests on iOS Simulator via dotnet test'

inputs:
  test-project:
    description: 'Path to the test project'
    default: 'sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj'
  target-framework:
    description: 'Target framework'
    default: 'net10.0-ios'
  runtime-identifier:
    description: 'Runtime identifier'
    default: 'iossimulator-x64'
  configuration:
    description: 'Build configuration'
    default: 'release'
  simulator-device-type:
    description: 'iOS Simulator device type'
    default: 'iPhone 16'
  artifact-name:
    description: 'Artifact name'
    default: 'Test Results (dotnet test) - iOS'

runs:
  using: 'composite'
  steps:
    - name: Setup Required Tools
      uses: ./.github/workflows/setup-tools
    - name: Create and Boot Simulator
      shell: bash
      run: |
        SIMULATOR_NAME="DeviceRunner-$GITHUB_RUN_ID-dotnet-test-ios"
        RESULT=$(dotnet apple simulator create "$SIMULATOR_NAME" --device-type "${{ inputs.simulator-device-type }}" --format json)
        UDID=$(echo "$RESULT" | jq -r '.udid')
        echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
        echo "SIMULATOR_NAME=$SIMULATOR_NAME" >> $GITHUB_ENV
        dotnet apple simulator boot "$UDID" --wait
    - name: Publish CLI Tool Binaries
      shell: bash
      run: dotnet publish src/DeviceRunners.Cli/DeviceRunners.Cli.csproj -f net10.0 -r osx-x64 -p:PublishForTargetsPackage=true -o src/DeviceRunners.Testing.Targets/tools/osx-x64
    - name: Run Tests
      shell: bash
      run: |
        dotnet test ${{ inputs.test-project }} \
          -f ${{ inputs.target-framework }} \
          -r ${{ inputs.runtime-identifier }} \
          -c ${{ inputs.configuration }} \
          -p:DeviceRunnersDevice=$SIMULATOR_UDID \
          /bl:./artifacts/logs/msbuild-test.binlog
    - name: Clean up build artifacts before upload
      if: always()
      shell: bash
      run: |
        rm -rf ./artifacts/bin
        rm -rf ./artifacts/obj
    - name: Delete Simulator
      if: always()
      shell: bash
      run: dotnet apple simulator delete --force "$SIMULATOR_NAME"
    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ./artifacts
