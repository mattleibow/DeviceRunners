name: 'TCP Windows Test'
description: 'Run TCP-based device tests on Windows (packaged MSIX)'

inputs:
  test-project:
    description: 'Path to the test project'
    default: 'sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj'
  target-framework:
    description: 'Target framework'
    default: 'net10.0-windows10.0.19041.0'
  configuration:
    description: 'Build configuration'
    default: 'release'
  artifact-name:
    description: 'Artifact name'
    default: 'Test Results (TCP) - Windows (MSIX)'

runs:
  using: 'composite'
  steps:
    - name: Setup Required Tools
      uses: ./.github/workflows/setup-tools
    - name: Build and Install CLI Tool
      shell: pwsh
      run: |
        dotnet pack src/DeviceRunners.Cli/DeviceRunners.Cli.csproj -c release
        dotnet tool install --global DeviceRunners.Cli
    - name: Publish App
      shell: pwsh
      run: |
        $certResult = device-runners windows cert install --project ${{ inputs.test-project }} --output Json
        $fingerprint = ($certResult | ConvertFrom-Json).Thumbprint
        dotnet publish ${{ inputs.test-project }} `
          -f ${{ inputs.target-framework }} `
          -c ${{ inputs.configuration }} `
          -p:TestingMode=NonInteractiveVisual `
          -p:IncludeFailingTests=false `
          -p:AppxPackageSigningEnabled=true `
          -p:PackageCertificateThumbprint=$fingerprint `
          -p:PackageCertificateKeyFile="" `
          /bl:./artifacts/logs/msbuild-publish.binlog
        device-runners windows cert uninstall --fingerprint $fingerprint
    - name: Run Tests
      shell: pwsh
      run: |
        $projectDir = Split-Path -Parent "${{ inputs.test-project }}"
        # WindowsAppSDK 1.8+ emits the packaged .msix under the project's AppPackages
        # folder rather than under artifacts, so search both locations. Exclude the
        # framework dependency packages so we select the app package itself.
        $searchRoots = @('artifacts', (Join-Path $projectDir 'AppPackages')) | Where-Object { Test-Path $_ }
        $msix = Get-ChildItem -Recurse -Filter "*.msix" -Path $searchRoots -ErrorAction SilentlyContinue |
          Where-Object { $_.FullName -notmatch '[\\/]Dependencies[\\/]' -and $_.Name -notlike 'Microsoft.WindowsAppRuntime*' } |
          Select-Object -First 1 -ExpandProperty FullName
        if (-not $msix) { Write-Error "No .msix file found"; exit 1 }
        device-runners windows test --app $msix --results-directory artifacts/test-results --logger trx
    - name: Clean up build artifacts before upload
      if: always()
      shell: pwsh
      run: |
        Remove-Item -Recurse -Force ./artifacts/bin -ErrorAction SilentlyContinue
        Remove-Item -Recurse -Force ./artifacts/obj -ErrorAction SilentlyContinue
    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ./artifacts
