name: TCP Android Test

on:
  pull_request:
  push:
    branches: [ main, 'releases/**' ]
  release:
    types: [ published ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  android:
    strategy:
      fail-fast: false
      matrix:
        platform: 
          - name: Linux
            os: ubuntu-24.04
            emulator-image: system-images;android-36;google_apis;x86_64
            runtime-identifier: android-x64
            connection-timeout: 120
            gpu: swiftshader_indirect
            cores: 2
            cpu-threshold: 3
            timeout-seconds: 1800
            partition-size: 4096
          - name: macOS (x64)
            os: macos-15-intel
            emulator-image: system-images;android-36;google_apis;x86_64
            runtime-identifier: android-x64
            connection-timeout: 900
            gpu: guest
            cores: 2
            cpu-threshold: 25
            timeout-seconds: 1800
            partition-size: 4096
    name: Android (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 60
    env:
      TEST_TARGET_FRAMEWORK: net10.0-android
      TEST_RUNTIME_IDENTIFIER: ${{ matrix.platform.runtime-identifier }}
      TEST_CONFIGURATION: release
      TEST_EMULATOR_NAME: TCPTestEmulator
      TEST_EMULATOR_IMAGE: ${{ matrix.platform.emulator-image }}
      ANDROID_TOOL_PROCESS_RUNNER_LOG_PATH: ./artifacts/logs/android-tool.log
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Validate Architecture
      uses: ./.github/workflows/validate-arch
      with:
        runtime-identifier: ${{ matrix.platform.runtime-identifier }}
    - name: Setup Required Tools
      uses: ./.github/workflows/setup-tools
    - uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '21'
    - name: Build and Install CLI Tool
      run: |
        dotnet pack src/DeviceRunners.Cli/DeviceRunners.Cli.csproj -c release
        dotnet tool install --global --add-source artifacts/package/release DeviceRunners.Cli
    - name: Install Android SDK Packages
      run: |
        mkdir -p ./artifacts/logs
        dotnet android sdk install --package 'platform-tools' --package 'emulator' --package '${{ env.TEST_EMULATOR_IMAGE }}'
    - name: Set AVD environment variables
      run: |
        mkdir -p "$HOME/.android/avd"
        echo "ANDROID_AVD_HOME=$HOME/.android/avd" >> "$GITHUB_ENV"
        echo "ANDROID_EMULATOR_HOME=$HOME/.android" >> "$GITHUB_ENV"
    - name: Create Emulator
      run: dotnet android avd create --name ${{ env.TEST_EMULATOR_NAME }} --sdk '${{ env.TEST_EMULATOR_IMAGE }}' --force
    - name: Reduce AVD Data Partition Size
      if: runner.os == 'Linux'
      run: |
        AVD_CONFIG="$HOME/.android/avd/${{ env.TEST_EMULATOR_NAME }}.avd/config.ini"
        sed -i 's/disk.dataPartition.size.*/disk.dataPartition.size = 4294967296/' "$AVD_CONFIG"
    - name: Enable KVM
      if: runner.os == 'Linux'
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm
    - name: Start Emulator
      run: |
        dotnet android avd start -p 5554 --name ${{ env.TEST_EMULATOR_NAME }} --no-window --gpu ${{ matrix.platform.gpu }} --no-snapshot --no-audio --no-boot-anim --wait --no-animations --cpu-threshold ${{ matrix.platform.cpu-threshold }} --cores ${{ matrix.platform.cores }} --timeout ${{ matrix.platform.timeout-seconds }} --response-threshold 5 --partition-size ${{ matrix.platform.partition-size }}
        dotnet android device list
    - name: Display Android Tool Logs
      if: always()
      run: cat ${{ env.ANDROID_TOOL_PROCESS_RUNNER_LOG_PATH }}
    - name: Publish App
      run: |
        dotnet publish sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj \
          -f ${{ env.TEST_TARGET_FRAMEWORK }} \
          -r ${{ env.TEST_RUNTIME_IDENTIFIER }} \
          -c ${{ env.TEST_CONFIGURATION }} \
          -p:TestingMode=NonInteractiveVisual \
          -p:AndroidSdkDirectory=$ANDROID_SDK_ROOT \
          /bl:./artifacts/logs/msbuild-publish.binlog
    - name: Wait for Emulator Stability
      if: runner.os == 'macOS'
      run: |
        ADB="$(dotnet android sdk info --format json | jq -r '.SdkInfo.Path')/platform-tools/adb"
        $ADB -s emulator-5554 shell am force-stop com.android.phone || true
        sleep 30
        dotnet android device list
    - name: Run Tests
      timeout-minutes: 30
      run: |
        device-runners android test \
          --app artifacts/bin/DeviceTestingKitApp.DeviceTests/${{ env.TEST_CONFIGURATION }}_${{ env.TEST_TARGET_FRAMEWORK }}_${{ env.TEST_RUNTIME_IDENTIFIER }}/com.companyname.devicetestingkitapp.devicetests-Signed.apk \
          --results-directory artifacts/test-results \
          --connection-timeout ${{ matrix.platform.connection-timeout }}
    - name: Capture Logcat
      if: always()
      run: dotnet android device logcat --output ./artifacts/logs/logcat.txt
    - name: Cleanup Emulator
      if: always()
      run: dotnet android avd delete --name ${{ env.TEST_EMULATOR_NAME }} --force
    - name: Clean up build artifacts before upload
      run: |
        rm -rf ./artifacts/bin
        rm -rf ./artifacts/obj
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: Test Results (TCP) - Android (${{ matrix.platform.name }})
        path: ./artifacts
