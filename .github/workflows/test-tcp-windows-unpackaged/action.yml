name: 'TCP Windows Test (Unpackaged)'
description: 'Run TCP-based device tests on Windows (unpackaged executable)'

inputs:
  test-project:
    description: 'Path to the test project'
    default: 'sample/test/DeviceTestingKitApp.DeviceTests/DeviceTestingKitApp.DeviceTests.csproj'
  target-framework:
    description: 'Target framework'
    default: 'net10.0-windows10.0.19041.0'
  configuration:
    description: 'Build configuration'
    default: 'release'
  artifact-name:
    description: 'Artifact name'
    default: 'Test Results (TCP) - Windows (EXE)'

runs:
  using: 'composite'
  steps:
    - name: Setup Required Tools
      uses: ./.github/workflows/setup-tools
    - name: Build and Install CLI Tool
      shell: pwsh
      run: |
        dotnet pack src/DeviceRunners.Cli/DeviceRunners.Cli.csproj -c release
        dotnet tool install --global DeviceRunners.Cli
    - name: Publish App as Unpackaged Executable
      shell: pwsh
      run: |
        dotnet publish ${{ inputs.test-project }} `
          -f ${{ inputs.target-framework }} `
          -c ${{ inputs.configuration }} `
          -p:TestingMode=NonInteractiveVisual `
          -p:WindowsPackageType=None `
          --output artifacts/publish `
          /bl:./artifacts/logs/msbuild-publish-unpackaged.binlog
    - name: Run Tests with Unpackaged App
      shell: pwsh
      run: |
        $exe = Get-ChildItem "artifacts/publish/DeviceTestingKitApp.DeviceTests.exe"
        device-runners windows test --app $exe --results-directory artifacts/test-results --logger trx
    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ./artifacts
