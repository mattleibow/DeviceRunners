name: Setup Tools

description: Installs and configures all the required tools

inputs:
  xcode-version:
    description: 'The version of Xcode to install.'
    required: false
    default: '26.2'

runs:
  using: composite
  steps:
  - name: Setup Xcode
    uses: maxim-lobanov/setup-xcode@v1
    if: runner.os == 'macOS'
    with:
      xcode-version: ${{ inputs.xcode-version }}
  - name: Setup .NET
    uses: actions/setup-dotnet@v4
    with:
      dotnet-version: 10.0.x
  - name: Show .NET Info
    shell: pwsh
    run: dotnet --info
  - name: Setup .NET MAUI
    if: runner.os == 'Linux'
    shell: pwsh
    run: dotnet workload install maui-android --source https://api.nuget.org/v3/index.json
  - name: Setup .NET MAUI
    if: runner.os != 'Linux'
    shell: pwsh
    run: dotnet workload install maui --source https://api.nuget.org/v3/index.json
  - name: Setup Local .NET Tools
    shell: pwsh
    run: dotnet tool restore
  - name: Build and Install Apple Tool from Submodule
    if: runner.os == 'macOS'
    shell: pwsh
    run: |
      Push-Location external/AppleDev.Tools
      git fetch --unshallow 2>$null; if (-not $?) { Write-Host "Already unshallowed or full clone" }
      Pop-Location
      $Env:GITHUB_ENV = if ($IsWindows) { "NUL" } else { "/dev/null" }
      dotnet pack external/AppleDev.Tools/AppleDev.Tool/AppleDev.Tool.csproj -c Release -o ./artifacts/tools
      $pkg = Get-ChildItem ./artifacts/tools/AppleDev.Tools.*.nupkg | Select-Object -First 1
      $ver = $pkg.BaseName -replace '^AppleDev\.Tools\.', ''
      dotnet tool install --local --add-source ./artifacts/tools appledev.tools --version "$ver"
  - name: Build and Install Android Tool from Submodule
    shell: pwsh
    run: |
      Push-Location external/AndroidSdk.Tools
      git fetch --unshallow 2>$null; if (-not $?) { Write-Host "Already unshallowed or full clone" }
      Pop-Location
      $Env:GITHUB_ENV = if ($IsWindows) { "NUL" } else { "/dev/null" }
      dotnet pack external/AndroidSdk.Tools/AndroidSdk.Tool/AndroidSdk.Tool.csproj -c Release -o ./artifacts/tools -p:NBGV_GitEngine=Disabled
      $pkg = Get-ChildItem ./artifacts/tools/AndroidSdk.Tool.*.nupkg | Select-Object -First 1
      $ver = $pkg.BaseName -replace '^AndroidSdk\.Tool\.', ''
      dotnet tool install --local --add-source ./artifacts/tools androidsdk.tool --version "$ver"
