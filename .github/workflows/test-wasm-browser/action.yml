name: 'WASM Browser Test'
description: 'Build, publish, and run WASM browser tests using the DeviceRunners CLI'

inputs:
  test-project:
    description: 'Path to the WASM test project'
    default: 'sample/test/DeviceTestingKitApp.BrowserTests/DeviceTestingKitApp.BrowserTests.csproj'
  configuration:
    description: 'Build configuration'
    default: 'release'
  browser:
    description: 'Browser to use (chromium, firefox, webkit)'
    default: 'chromium'
  timeout:
    description: 'Test execution timeout in seconds'
    default: '300'
  artifact-name:
    description: 'Artifact name'
    default: 'Test Results - WASM Browser'

runs:
  using: 'composite'
  steps:
    - name: Setup Required Tools
      uses: ./.github/workflows/setup-tools

    - name: Build CLI Tool
      shell: bash
      run: dotnet build src/DeviceRunners.Cli/DeviceRunners.Cli.csproj -c ${{ inputs.configuration }} -f net10.0

    - name: Publish WASM Test App
      shell: bash
      run: |
        dotnet publish ${{ inputs.test-project }} \
          -c ${{ inputs.configuration }} \
          /bl:./artifacts/logs/msbuild-wasm-publish.binlog

    - name: Install Playwright Browsers
      shell: bash
      run: |
        # Playwright .NET uses the playwright.ps1 script to install browser binaries.
        # Find it in the NuGet package cache and run it.
        PLAYWRIGHT_PS1=$(find ~/.nuget/packages/microsoft.playwright -name "playwright.ps1" 2>/dev/null | sort -V | tail -1)
        if [ -n "$PLAYWRIGHT_PS1" ]; then
          pwsh "$PLAYWRIGHT_PS1" install --with-deps ${{ inputs.browser }}
        else
          # Fallback: try npx
          npx -y playwright install --with-deps ${{ inputs.browser }} 2>/dev/null || echo "Warning: Could not install Playwright browsers"
        fi

    - name: Determine WASM App Path
      id: wasm-path
      shell: bash
      run: |
        echo "Searching for published WASM app..."
        find ./artifacts -name "index.html" 2>/dev/null | head -10

        # For browser-wasm apps, look for index.html in the publish output.
        # Try wwwroot first (Blazor apps), then fall back to any publish dir with index.html.
        PUBLISH_DIR=$(find ./artifacts -type d -name "wwwroot" -path "*/publish/*" 2>/dev/null | head -1)
        if [ -z "$PUBLISH_DIR" ]; then
          PUBLISH_DIR=$(find ./artifacts -name "index.html" -path "*/publish/*" 2>/dev/null | head -1 | xargs dirname 2>/dev/null || true)
        fi
        if [ -z "$PUBLISH_DIR" ]; then
          # For simple console WASM apps, the publish dir may not have index.html.
          # Look for the AppBundle directory or any .wasm file in publish output.
          PUBLISH_DIR=$(find ./artifacts -type d -name "AppBundle" -path "*/publish/*" 2>/dev/null | head -1)
        fi
        if [ -z "$PUBLISH_DIR" ]; then
          PUBLISH_DIR=$(find ./artifacts -name "*.wasm" -path "*/publish/*" 2>/dev/null | head -1 | xargs dirname 2>/dev/null || true)
        fi
        if [ -z "$PUBLISH_DIR" ]; then
          echo "ERROR: Could not find published WASM app directory"
          echo "Listing all publish directories:"
          find ./artifacts -type d -name "publish" 2>/dev/null
          echo "Listing all artifacts:"
          find ./artifacts -type f 2>/dev/null | head -50
          exit 1
        fi
        echo "wasm-app-path=$PUBLISH_DIR" >> "$GITHUB_OUTPUT"
        echo "Found WASM app at: $PUBLISH_DIR"
        ls -la "$PUBLISH_DIR" | head -20

    - name: Run WASM Browser Tests
      shell: bash
      run: |
        mkdir -p ./artifacts/test-results
        dotnet run --project src/DeviceRunners.Cli/DeviceRunners.Cli.csproj -f net10.0 -- \
          wasm test \
          --app "${{ steps.wasm-path.outputs.wasm-app-path }}" \
          --browser ${{ inputs.browser }} \
          --timeout ${{ inputs.timeout }} \
          --logger "trx;LogFileName=test-results.trx" \
          --results-directory ./artifacts/test-results

    - name: Clean up build artifacts before upload
      if: always()
      shell: bash
      run: |
        rm -rf ./artifacts/bin
        rm -rf ./artifacts/obj

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ./artifacts
